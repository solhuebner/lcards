type: custom:lcards-msd-card
id: bridge
msd:
  base_svg: 
    source: builtin:ncc-1701-a-blue
  view_box: [0, 0, 1920, 1200]
  
  anchors:
    warp_core: [960, 600]
    bridge: [960, 300]
  
  overlays:
    - type: control
      id: warp_core_button
      card:
        type: custom:lcards-button
        entity: light.floor_lamp
        preset: lozenge
        text: 
          label: 
            content: "WARP CORE"
      anchor: warp_core
      size: [200, 60]
    
    - type: control
      id: shields_button
      card:
        type: button
        entity: light.tv
        name: "Shields"
      anchor: bridge
      size: [150, 80]
    
    - type: line
      id: power_conduit
      anchor: bridge
      attach_to: warp_core_button
      attach_side: top
      style: 
        stroke: var(--lcars-orange)
        stroke_width: 3
