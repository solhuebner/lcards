<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCARdS Simple Card Test</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: #ffffff;
        }

        .test-section {
            margin: 40px 0;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 4px;
        }

        .test-section h2 {
            margin-top: 0;
            color: #ff9900;
        }

        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .test-card {
            padding: 20px;
            background: #2a2a2a;
            border-radius: 4px;
        }

        .test-card h3 {
            margin-top: 0;
            color: #00ffff;
            font-size: 14px;
        }

        .console-output {
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>LCARdS Simple Card Foundation Tests</h1>

    <!-- Test 1: Basic Button -->
    <div class="test-section">
        <h2>Test 1: Basic Button</h2>
        <div class="test-grid">
            <div class="test-card">
                <h3>Default Style</h3>
                <lcards-button
                    id="test-button-1"
                    data-entity="light.test"
                    data-label="Test Button">
                </lcards-button>
            </div>

            <div class="test-card">
                <h3>With Preset</h3>
                <lcards-button
                    id="test-button-2"
                    data-entity="light.test"
                    data-label="Lozenge Button"
                    data-preset="lozenge">
                </lcards-button>
            </div>
        </div>
    </div>

    <!-- Test 2: Template Processing -->
    <div class="test-section">
        <h2>Test 2: Template Processing</h2>
        <div class="test-grid">
            <div class="test-card">
                <h3>JavaScript Template</h3>
                <lcards-button
                    id="test-button-3"
                    data-entity="light.test"
                    data-label="[[[return entity.state.toUpperCase()]]]">
                </lcards-button>
            </div>

            <div class="test-card">
                <h3>Token Template</h3>
                <lcards-button
                    id="test-button-4"
                    data-entity="light.test"
                    data-label="{{entity.attributes.friendly_name}}">
                </lcards-button>
            </div>
        </div>
    </div>

    <!-- Test 3: Actions -->
    <div class="test-section">
        <h2>Test 3: Actions</h2>
        <div class="test-grid">
            <div class="test-card">
                <h3>Toggle Action</h3>
                <lcards-button
                    id="test-button-5"
                    data-entity="light.test"
                    data-label="Toggle Light"
                    data-tap-action='{"action": "toggle"}'>
                </lcards-button>
            </div>

            <div class="test-card">
                <h3>More Info Action</h3>
                <lcards-button
                    id="test-button-6"
                    data-entity="light.test"
                    data-label="Light Info"
                    data-tap-action='{"action": "more-info"}'>
                </lcards-button>
            </div>
        </div>
    </div>

    <!-- Console Output -->
    <div class="test-section">
        <h2>Console Output</h2>
        <div id="console-output" class="console-output">
            Initializing test environment...
        </div>
    </div>

    <!-- Mock Home Assistant -->
    <script>
        // Console output capture
        const consoleDiv = document.getElementById('console-output');
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;

        function addToConsole(type, ...args) {
            const timestamp = new Date().toLocaleTimeString();
            const message = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)).join(' ');
            consoleDiv.innerHTML += `<div>[${timestamp}] ${type.toUpperCase()}: ${message}</div>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        console.log = (...args) => {
            originalLog.apply(console, args);
            addToConsole('log', ...args);
        };

        console.warn = (...args) => {
            originalWarn.apply(console, args);
            addToConsole('warn', ...args);
        };

        console.error = (...args) => {
            originalError.apply(console, args);
            addToConsole('error', ...args);
        };

        // Create mock HASS instance
        window.hass = {
            states: {
                'light.test': {
                    entity_id: 'light.test',
                    state: 'on',
                    attributes: {
                        friendly_name: 'Test Light',
                        brightness: 255
                    }
                }
            },
            callService: (domain, service, data) => {
                console.log('Service call:', domain, service, data);

                // Mock toggle
                if (service === 'toggle') {
                    const entity = window.hass.states[data.entity_id];
                    if (entity) {
                        entity.state = entity.state === 'on' ? 'off' : 'on';
                        console.log('Toggled entity:', data.entity_id, 'to', entity.state);

                        // Trigger update
                        document.querySelectorAll('lcards-button').forEach(card => {
                            if (card.hass) {
                                card.hass = { ...window.hass };
                            }
                        });
                    }
                }
            },
            user: {
                name: 'Test User',
                is_admin: true
            },
            services: {},
            config: {
                components: [],
                version: '2024.1.0'
            }
        };

        // Initialize mock LCARdS core
        window.lcards = {
            core: {
                getThemeManager: () => ({
                    getToken: (path, fallback) => {
                        console.log('Theme token requested:', path, 'fallback:', fallback);
                        return fallback;
                    }
                }),
                getStylePresetManager: () => ({
                    getPreset: (type, name) => {
                        console.log('Style preset requested:', type, name);
                        if (type === 'button' && name === 'lozenge') {
                            return {
                                borderRadius: '20px',
                                padding: '8px 16px',
                                background: 'linear-gradient(45deg, #ff9900, #ffaa00)'
                            };
                        }
                        return null;
                    }
                }),
                rulesManager: {},
                animationManager: {},
                dataSourceManager: {},
                validationService: {},
                actionHandler: {},
                ingestHass: (hass) => {
                    console.log('HASS ingested to core:', hass ? 'present' : 'null');
                }
            }
        };

        console.log('Mock HASS initialized:', window.hass);
    </script>

    <!-- Load LCARdS -->
    <script type="module" src="../dist/lcards.js"></script>

    <!-- Initialize cards with mock HASS and config -->
    <script type="module">
        // Wait for custom elements to be defined
        console.log('Waiting for lcards-button to be defined...');
        await customElements.whenDefined('lcards-button');
        console.log('lcards-button is defined!');

        // Configure and initialize cards
        document.querySelectorAll('lcards-button').forEach((card, index) => {
            console.log('Configuring card', index + 1);

            // Build config from data attributes
            const config = {
                type: 'custom:lcards-button',
                entity: card.dataset.entity,
                label: card.dataset.label,
                preset: card.dataset.preset,
                width: 200,
                height: 60
            };

            if (card.dataset.tapAction) {
                try {
                    config.tap_action = JSON.parse(card.dataset.tapAction);
                } catch (e) {
                    console.warn('Failed to parse tap_action for card', index + 1, e);
                }
            }

            // Set config and HASS
            card.setConfig(config);
            card.hass = window.hass;

            console.log('Card', index + 1, 'configured with:', config);
        });

        console.log('All cards initialized with HASS');

        // Test state changes
        setTimeout(() => {
            console.log('Testing state change...');
            const testEntity = window.hass.states['light.test'];
            testEntity.state = 'off';

            // Notify all cards of the change
            document.querySelectorAll('lcards-button').forEach(card => {
                card.hass = { ...window.hass };
            });
        }, 3000);

        setTimeout(() => {
            console.log('Testing state change back to on...');
            const testEntity = window.hass.states['light.test'];
            testEntity.state = 'on';

            // Notify all cards of the change
            document.querySelectorAll('lcards-button').forEach(card => {
                card.hass = { ...window.hass };
            });
        }, 6000);
    </script>
</body>
</html>
