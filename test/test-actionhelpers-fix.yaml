# Simple Button ActionHelpers Test
# Test pointer-events fix for ActionHelpers click registration

resources:
  - url: /hacsfiles/lcards/lcards.js
    type: module

views:
  - title: Click Test
    cards:
      # Simple Button Test - Light Toggle
      - type: custom:lcards-simple-button
        entity: light.tv
        label: "Bedroom Light"
        preset: lozenge
        tap_action:
          action: toggle
        hold_action:
          action: more-info

      # Simple Button Test - Script Action
      - type: custom:lcards-simple-button
        entity: script.test_action
        label: "RUN SCRIPT"
        preset: pill
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.test_action

      # Simple Button Test - Navigation
      - type: custom:lcards-simple-button
        label: "NAVIGATION TEST"
        preset: rectangle
        tap_action:
          action: navigate
          navigation_path: "/lovelace/0"
        double_tap_action:
          action: more-info
          entity: sensor.time