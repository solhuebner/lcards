<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCARdS Overlay Cards Test</title>
    <style>
        body {
            font-family: 'Antonio', Arial, sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #FF9900;
        }
        .card-container {
            width: 400px;
            height: 300px;
            border: 1px solid #333;
            margin: 20px 0;
            position: relative;
            background: #000;
        }
        h1, h2 {
            color: #FF9900;
            text-align: center;
        }
        .log {
            background: #222;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin: 10px 0;
        }
        .status {
            color: #00FF00;
        }
        .error {
            color: #FF0000;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🚀 LCARdS Phase 2b Overlay Cards Test</h1>

        <div class="log" id="log">
            <div class="status">[INFO] Starting overlay card tests...</div>
        </div>

        <h2>Text Card Test</h2>
        <div class="card-container">
            <lcards-text-card id="text-test"></lcards-text-card>
        </div>

        <h2>Button Card Test</h2>
        <div class="card-container">
            <lcards-button-card id="button-test"></lcards-button-card>
        </div>

        <button onclick="runTests()" style="background: #FF9900; color: #000; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
            Run Tests
        </button>
    </div>

    <!-- Load LCARdS -->
    <script type="module" src="../hacsfiles/lcards/lcards.js"></script>

    <script>
        function log(message, type = 'status') {
            const logElement = document.getElementById('log');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toISOString().substr(11, 8)}] ${message}`;
            logElement.appendChild(div);
            logElement.scrollTop = logElement.scrollHeight;
        }

        // Mock HASS object for testing
        const mockHass = {
            states: {
                'sensor.temperature': {
                    state: '23.5',
                    attributes: {
                        unit_of_measurement: '°C',
                        friendly_name: 'Living Room Temperature'
                    }
                },
                'light.living_room': {
                    state: 'on',
                    attributes: {
                        brightness: 255,
                        friendly_name: 'Living Room Light'
                    }
                }
            },
            callService: (domain, service, data) => {
                log(`Mock service call: ${domain}.${service}`, 'status');
                console.log('Service call:', domain, service, data);
            }
        };

        function runTests() {
            log('Running overlay card tests...', 'status');

            try {
                // Test Text Card
                const textCard = document.getElementById('text-test');
                if (textCard) {
                    log('Testing text card configuration...', 'status');

                    textCard.setConfig({
                        text: "Temperature: {{sensor.temperature}}°C",
                        position: { x: 50, y: 50 },
                        style: {
                            fontSize: "24px",
                            color: "#FF9900",
                            fontFamily: "LCARS",
                            textAlign: "center"
                        }
                    });

                    textCard.hass = mockHass;
                    log('Text card configured successfully ✅', 'status');
                } else {
                    log('Text card element not found ❌', 'error');
                }

                // Test Button Card
                const buttonCard = document.getElementById('button-test');
                if (buttonCard) {
                    log('Testing button card configuration...', 'status');

                    buttonCard.setConfig({
                        label: "Toggle {{light.living_room.attributes.friendly_name}}",
                        entity: "light.living_room",
                        position: { x: 50, y: 50, width: 200, height: 45 },
                        style: {
                            fontSize: "16px",
                            color: "#FFFFFF",
                            backgroundColor: "#FF9900",
                            borderColor: "#FF9900",
                            fontFamily: "LCARS"
                        },
                        action: {
                            tap: {
                                action: "toggle",
                                target: { entity_id: "light.living_room" }
                            }
                        }
                    });

                    buttonCard.hass = mockHass;
                    log('Button card configured successfully ✅', 'status');
                } else {
                    log('Button card element not found ❌', 'error');
                }

                log('All tests completed! Check the cards above.', 'status');

            } catch (error) {
                log(`Test error: ${error.message}`, 'error');
                console.error('Test error:', error);
            }
        }

        // Check for custom elements when page loads
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const textCardDefined = customElements.get('lcards-text-card');
                const buttonCardDefined = customElements.get('lcards-button-card');

                if (textCardDefined) {
                    log('lcards-text-card custom element registered ✅', 'status');
                } else {
                    log('lcards-text-card custom element NOT found ❌', 'error');
                }

                if (buttonCardDefined) {
                    log('lcards-button-card custom element registered ✅', 'status');
                } else {
                    log('lcards-button-card custom element NOT found ❌', 'error');
                }

                // Check overlay registry
                if (window.LCARDS_OVERLAY_REGISTRY) {
                    const registryKeys = Object.keys(window.LCARDS_OVERLAY_REGISTRY);
                    log(`Overlay registry found: ${registryKeys.join(', ')} ✅`, 'status');
                } else {
                    log('Overlay registry not found ❌', 'error');
                }

                // Check core systems
                if (window.lcards?.core) {
                    log('LCARdS core systems available ✅', 'status');
                } else {
                    log('LCARdS core systems not found ❌', 'error');
                }
            }, 2000); // Wait for LCARdS to load
        });
    </script>
</body>
</html>
