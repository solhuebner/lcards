# ============================================================================
# DATA GRID REFACTOR - HIERARCHICAL STYLING TEST
# ============================================================================
# Purpose: Test complete style cascade (Grid → Header → Column → Row → Cell)
# Duration: 10 minutes
# Expected: Clear demonstration of style hierarchy and overrides
# ============================================================================

# ----------------------------------------------------------------------------
# CARD 1: Grid-Wide Styling
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: random
format: hex

grid:
  grid-template-columns: repeat(10, 1fr)
  gap: 8px

# Grid-wide style applies to ALL cells
style:
  color: colors.lcars.orange
  font_size: 20
  font_weight: 500
  padding: 12px
  border_width: 1
  border_color: colors.grid.border
  border_style: solid
  align: center

id: test-hierarchy-grid-wide

---

# ----------------------------------------------------------------------------
# CARD 2: Column-Level Overrides (Spreadsheet Mode)
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: datasource
layout: spreadsheet

grid:
  gap: 10px

# Grid-wide defaults
style:
  font_size: 16
  color: colors.grid.cellText
  padding: 8px

# Header defaults
header_style:
  background: colors.grid.headerBackground
  color: colors.grid.headerText
  font_weight: 700
  text_transform: uppercase

# Column-specific styling (overrides grid-wide)
columns:
  - header: Status
    width: 100
    align: center
    style:
      color: colors.lcars.blue
      font_weight: 700
      background: alpha(colors.lcars.blue, 0.1)
  
  - header: Location
    width: 140
    align: left
    style:
      color: colors.lcars.orange
      font_weight: 500
  
  - header: Value
    width: 80
    align: right
    style:
      color: colors.lcars.green
      font_weight: 600

# Sample data
rows:
  - sources:
      - column: 0
        type: static
        value: "ONLINE"
      - column: 1
        type: static
        value: "Bridge"
      - column: 2
        type: static
        value: "100%"

id: test-hierarchy-columns

---

# ----------------------------------------------------------------------------
# CARD 3: Row-Level Overrides (Template Mode)
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: template

grid:
  grid-template-columns: 1fr 1fr 1fr
  gap: 8px

# Grid defaults
style:
  font_size: 16
  color: colors.grid.cellText
  padding: 8px

# Rows with individual styling
rows:
  # Row 1: Header with custom styling
  - values: ['Location', 'Status', 'Alert']
    style:
      background: colors.grid.headerBackground
      color: colors.grid.headerText
      font_weight: 700
      text_transform: uppercase
      border_bottom_width: 2
      border_bottom_color: colors.grid.divider
      border_bottom_style: solid
      padding: 12px 8px
  
  # Row 2: Normal row (uses grid defaults)
  - values: ['Deck 1', 'ACTIVE', 'NONE']
  
  # Row 3: Alert row with red styling
  - values: ['Deck 2', 'WARNING', 'CRITICAL']
    style:
      background: alpha(colors.grid.error, 0.2)
      color: colors.grid.error
      font_weight: 600
  
  # Row 4: Normal row
  - values: ['Deck 3', 'ACTIVE', 'NONE']
  
  # Row 5: Info row with blue styling
  - values: ['Deck 4', 'STANDBY', 'INFO']
    style:
      background: alpha(colors.lcars.blue, 0.1)
      color: colors.lcars.blue
      font_weight: 500

id: test-hierarchy-rows

---

# ----------------------------------------------------------------------------
# CARD 4: Cell-Level Overrides (Template Mode)
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: template

grid:
  grid-template-columns: 1fr 1fr 1fr 1fr
  gap: 10px

style:
  font_size: 16
  color: colors.grid.cellText
  padding: 8px

rows:
  # Header row
  - values: ['System', 'Status', 'Priority', 'Action']
    cellStyles:
      - color: colors.lcars.blue
        font_weight: 700
      - color: colors.lcars.orange
        font_weight: 700
      - color: colors.lcars.red
        font_weight: 700
      - color: colors.lcars.green
        font_weight: 700
  
  # Data row 1: Mixed cell styling
  - values: ['Shields', 'ONLINE', 'HIGH', 'MONITOR']
    cellStyles:
      - null  # Use grid default
      - color: colors.grid.success
        font_weight: 600
        background: alpha(colors.grid.success, 0.1)
      - color: colors.grid.error
        font_weight: 600
        background: alpha(colors.grid.error, 0.1)
      - null  # Use grid default
  
  # Data row 2: Different cell styling
  - values: ['Weapons', 'STANDBY', 'MEDIUM', 'READY']
    cellStyles:
      - null
      - color: colors.grid.warning
        font_weight: 500
      - color: colors.lcars.orange
        font_weight: 500
      - color: colors.lcars.green
        font_weight: 600
  
  # Data row 3: Critical alert styling
  - values: ['Life Support', 'CRITICAL', 'CRITICAL', 'ENGAGE']
    cellStyles:
      - font_weight: 900
      - color: colors.grid.error
        font_weight: 900
        background: alpha(colors.grid.error, 0.3)
        border_width: 2
        border_color: colors.grid.error
        border_style: solid
      - color: colors.grid.error
        font_weight: 900
        background: alpha(colors.grid.error, 0.3)
      - color: colors.grid.error
        font_weight: 900

id: test-hierarchy-cells

---

# ----------------------------------------------------------------------------
# CARD 5: Complete Hierarchy (All Levels)
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: template

grid:
  grid-template-columns: 140px 1fr 80px 100px
  gap: 8px

# Level 1: Grid-wide defaults
style:
  font_size: 14
  color: colors.grid.cellText
  padding: 8px
  align: left

rows:
  # Header row with grid+row styling
  - values: ['Component', 'Description', 'Status', 'Priority']
    style:  # Row-level override
      background: colors.grid.headerBackground
      color: colors.grid.headerText
      font_weight: 700
      text_transform: uppercase
      padding: 10px 8px
    cellStyles:  # Cell-level overrides (highest priority)
      - null
      - null
      - align: center  # Override row align
      - align: center
  
  # Data row demonstrating full cascade
  - values: ['Main Computer', 'Primary processing unit', 'OPTIMAL', 'LOW']
    style:
      background: alpha(colors.lcars.blue, 0.05)
    cellStyles:
      - font_weight: 600
        color: colors.lcars.blue
      - null  # Use row+grid style
      - align: center
        color: colors.grid.success
        font_weight: 600
      - align: center
        color: colors.lcars.green
  
  # Alert row
  - values: ['Warp Core', 'Antimatter containment', 'WARNING', 'HIGH']
    style:
      background: alpha(colors.grid.warning, 0.1)
      color: colors.grid.warning
    cellStyles:
      - font_weight: 700
      - null
      - align: center
        color: colors.grid.warning
        font_weight: 700
        background: alpha(colors.grid.warning, 0.2)
      - align: center
        color: colors.grid.error
        font_weight: 700

id: test-hierarchy-complete
