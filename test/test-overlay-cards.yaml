# LCARdS Phase 2b Overlay Cards Test Configuration
# This file demonstrates the new standalone overlay cards

# Test 1: Text Card with Template
- type: custom:lcards-text-card
  text: "Temperature: {{sensor.temperature}}°C"
  position:
    x: 50
    y: 25
  style:
    fontSize: "24px"
    color: "#FF9900"
    fontFamily: "LCARS"
    textAlign: "center"

# Test 2: Simple Text Card
- type: custom:lcards-text-card
  text: "LCARS System Status"
  position:
    x: 50
    y: 75
  style:
    fontSize: "18px"
    color: "#00FF00"
    fontFamily: "LCARS"
    textAlign: "center"

# Test 3: Button Card with Entity Action
- type: custom:lcards-button-card
  label: "Toggle Light"
  entity: "light.living_room"
  position:
    x: 25
    y: 50
    width: 120
    height: 40
  style:
    fontSize: "14px"
    color: "#FFFFFF"
    backgroundColor: "#FF9900"
    borderColor: "#FF9900"
    fontFamily: "LCARS"
  action:
    tap:
      action: "toggle"
      target:
        entity_id: "light.living_room"

# Test 4: Button Card with Custom Action
- type: custom:lcards-button-card
  label: "Navigate"
  position:
    x: 75
    y: 50
    width: 100
    height: 40
  style:
    fontSize: "14px"
    color: "#000000"
    backgroundColor: "#00FFFF"
    borderColor: "#00FFFF"
    fontFamily: "LCARS"
  action:
    tap:
      action: "navigate"
      navigation_path: "/lovelace/dashboard"

# Test 5: Text Card with Data Source (Entity State)
- type: custom:lcards-text-card
  text: "{{light.living_room.state}}"
  data_source: "light.living_room"
  position:
    x: 25
    y: 75
  style:
    fontSize: "16px"
    color: "#FFFF00"
    fontFamily: "LCARS"

# Test 6: Button Card with Template Label
- type: custom:lcards-button-card
  label: "{{light.living_room.attributes.friendly_name}}"
  entity: "light.living_room"
  position:
    x: 75
    y: 75
    width: 140
    height: 35
  style:
    fontSize: "12px"
    color: "#FFFFFF"
    backgroundColor: "#9966CC"
    borderColor: "#9966CC"
    fontFamily: "LCARS"
  action:
    tap:
      action: "more-info"
      target:
        entity_id: "light.living_room"