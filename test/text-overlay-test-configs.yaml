# Test Configuration for LCARdS Text Overlay Styles
# Copy these configurations into your HA dashboard to test

# Test 1: Basic CSS-style properties
type: custom:lcards-text-card
text: "CSS Style Test"
style:
  fontSize: '18px'
  color: '#FFCC00'
  fontFamily: 'LCARS'
  fontWeight: 'bold'
layout:
  text_align: 'center'
  vertical_align: 'middle'

---

# Test 2: MSD-style properties (advanced)
type: custom:lcards-text-card
text: "MSD Style Test"
font_size: 20
color: '#FF6600'
font_family: 'Antonio'
text_anchor: 'middle'
dominant_baseline: 'central'
stroke: '#FFFFFF'
stroke_width: 1
opacity: 0.9
layout:
  text_align: 'center'
  vertical_align: 'middle'

---

# Test 3: Layout positioning controls
type: custom:lcards-text-card
text: "Layout Test"
font_size: 16
color: '#00FFFF'
layout:
  text_align: 'left'
  vertical_align: 'top'
  padding:
    top: 15
    left: 20
    bottom: 10
    right: 10

---

# Test 4: Multi-line text with effects
type: custom:lcards-text-card
text: "Line 1\nLine 2\nLine 3"
multiline: true
line_height: 1.4
font_size: 14
color: '#00FF00'
glow: true
layout:
  text_align: 'center'
  vertical_align: 'middle'

---

# Test 5: LCARS brackets and status
type: custom:lcards-text-card
text: "LCARS System"
font_size: 16
color: '#FFFFFF'
bracket_style: 'rounded'
bracket_color: '#FF9900'
bracket_width: 2
status_indicator: 'ONLINE'
status_indicator_position: 'left'
layout:
  text_align: 'center'
  vertical_align: 'middle'

---

# Test 6: Mixed priority test (MSD overrides CSS)
type: custom:lcards-text-card
text: "Priority Test"
# MSD property (should win)
font_size: 24
color: '#FF0000'
# CSS properties (should be overridden)
style:
  fontSize: '12px'  # Should be ignored
  color: '#0000FF'  # Should be ignored
  fontWeight: 'bold'  # Should work (not overridden)
layout:
  text_align: 'center'
  vertical_align: 'middle'