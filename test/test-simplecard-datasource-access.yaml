# Test: SimpleCard Accessing MSD Datasources

# This test verifies that SimpleCard can access datasources defined in MSD cards
# via the global dataSourceManager singleton

type: vertical-stack
cards:
  # Test 1: SimpleCard with explicit datasource syntax
  - type: custom:lcards
    card_type: simple
    card_name: simple-datasource-explicit
    entity: sensor.test
    label_top: "Temp (explicit)"
    label_main: "{datasource:temperature_chain:.1f}°C"
    label_bottom: "{datasource:test_cpu_temp:%}"
    styles:
      shape: rounded-short

  # Test 2: SimpleCard with legacy datasource syntax
  - type: custom:lcards
    card_type: simple
    card_name: simple-datasource-legacy
    entity: sensor.test
    label_top: "Temp (legacy)"
    label_main: "{sensor.temp:.1f}°C"
    styles:
      shape: rounded-short

  # Test 3: SimpleCard with mixed templates including datasource
  - type: custom:lcards
    card_type: simple
    card_name: simple-mixed-with-datasource
    entity: sensor.test
    label_top: "[[[return 'Computed']]]"
    label_main: "{entity.state}"
    label_side: "{datasource:temperature_chain:.1f}"
    label_bottom: "{{now().strftime('%H:%M')}}"
    styles:
      shape: rounded-short

  # Test 4: SimpleCard with datasource in button text
  - type: custom:lcards
    card_type: simple_button
    card_name: button-with-datasource
    entity: light.test
    label: "Temp: {datasource:temperature_chain:.1f}°C"
    styles:
      shape: rounded

  # Test 5: SimpleCard with datasource + Jinja2
  - type: custom:lcards
    card_type: simple
    card_name: simple-datasource-jinja-combo
    entity: sensor.test
    label_top: "Combo Test"
    label_main: "DS: {datasource:temperature_chain:.1f}°C"
    label_bottom: "Jinja: {{states('sensor.test')}}"
    styles:
      shape: rounded-short

  # Test 6: SimpleCard accessing datasource transformation
  - type: custom:lcards
    card_type: simple
    card_name: simple-datasource-transformation
    entity: sensor.test
    label_top: "Transformation Test"
    label_main: "{datasource:temperature_chain.transformations.celsius:.1f}"
    styles:
      shape: rounded-short

  # Test 7: SimpleCard accessing datasource aggregation
  - type: custom:lcards
    card_type: simple
    card_name: simple-datasource-aggregation
    entity: sensor.test
    label_top: "Aggregation Test"
    label_main: "Avg: {datasource:test_aggregations.aggregations.avg_10:.1f}"
    styles:
      shape: rounded-short

  # Test 8: All template types in one SimpleCard
  - type: custom:lcards
    card_type: simple
    card_name: simple-all-types-with-datasource
    entity: sensor.test
    label_top: "[[[return 'JS: ' + entity.state]]]"
    label_main: "Token: {entity.attributes.friendly_name}"
    label_side: "DS: {datasource:temperature_chain:.0f}"
    label_bottom: "Jinja: {{now().hour}}:{{now().minute}}"
    styles:
      shape: rounded-short

# Expected Results:
# - All datasource references should resolve to actual values
# - No console errors about datasource access
# - SimpleCard can access datasources defined in MSD cards
# - Both {datasource:name} and {sensor.name} syntax work
# - Datasource transformations and aggregations accessible
# - All template types work together seamlessly
