# ============================================================================
# DATA GRID REFACTOR - THEME TOKEN INTEGRATION TEST
# ============================================================================
# Purpose: Verify theme tokens resolve correctly across all contexts
# Duration: 5 minutes
# Expected: Colors match theme palette, update on theme switching
# ============================================================================

# ----------------------------------------------------------------------------
# CARD 1: Grid-Specific Theme Tokens
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: random
format: hex

grid:
  grid-template-columns: repeat(10, 1fr)
  gap: 8px

# All grid-specific theme tokens
style:
  color: colors.grid.cellText
  background: colors.grid.cellBackground
  font_size: 18
  padding: 8px

animation:
  type: cascade
  colors:
    start: colors.grid.cascadeStart
    text: colors.grid.cascadeMid
    end: colors.grid.cascadeEnd

id: test-theme-grid-tokens

---

# ----------------------------------------------------------------------------
# CARD 2: Generic Theme Tokens
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: template

grid:
  grid-template-columns: 1fr 1fr 1fr
  gap: 10px

style:
  color: colors.text.primary
  font_size: 16

rows:
  - values: ['Header 1', 'Header 2', 'Header 3']
    style:
      background: colors.background.header
      color: colors.text.header
      font_weight: 700
      border_bottom_width: 2
      border_bottom_color: colors.divider
  
  - values: ['Data 1', 'Data 2', 'Data 3']
  - values: ['Data 4', 'Data 5', 'Data 6']

id: test-theme-generic-tokens

---

# ----------------------------------------------------------------------------
# CARD 3: LCARS Color Palette Tokens
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: template

grid:
  grid-template-columns: repeat(5, 1fr)
  gap: 12px

style:
  font_size: 14
  padding: 10px
  align: center
  font_weight: 600

rows:
  # Color labels
  - values: ['Blue', 'Orange', 'Red', 'Green', 'Purple']
    style:
      background: colors.grid.headerBackground
      color: colors.grid.headerText
      font_weight: 700
  
  # Sample data with LCARS colors
  - values: ['100%', '85%', '50%', '95%', '70%']
    cellStyles:
      - color: colors.lcars.blue
        background: alpha(colors.lcars.blue, 0.1)
      - color: colors.lcars.orange
        background: alpha(colors.lcars.orange, 0.1)
      - color: colors.lcars.red
        background: alpha(colors.lcars.red, 0.1)
      - color: colors.lcars.green
        background: alpha(colors.lcars.green, 0.1)
      - color: colors.lcars.purple
        background: alpha(colors.lcars.purple, 0.1)

id: test-theme-lcars-tokens

---

# ----------------------------------------------------------------------------
# CARD 4: Computed Theme Tokens (alpha, darken, lighten)
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: template

grid:
  grid-template-columns: 1fr 1fr 1fr
  gap: 8px

style:
  font_size: 16
  padding: 10px

rows:
  # Demonstrate alpha transparency
  - values: ['Alpha 0.2', 'Alpha 0.5', 'Alpha 0.8']
    style:
      font_weight: 700
    cellStyles:
      - background: alpha(colors.lcars.blue, 0.2)
        color: colors.lcars.blue
      - background: alpha(colors.lcars.orange, 0.5)
        color: colors.lcars.orange
      - background: alpha(colors.lcars.red, 0.8)
        color: colors.text.primary
  
  # Demonstrate darken
  - values: ['Normal', 'Darker', 'Darkest']
    cellStyles:
      - background: colors.lcars.green
        color: colors.text.primary
      - background: darken(colors.lcars.green, 0.2)
        color: colors.text.primary
      - background: darken(colors.lcars.green, 0.4)
        color: colors.text.primary
  
  # Demonstrate lighten
  - values: ['Normal', 'Lighter', 'Lightest']
    cellStyles:
      - background: colors.lcars.purple
        color: colors.text.primary
      - background: lighten(colors.lcars.purple, 0.2)
        color: colors.text.primary
      - background: lighten(colors.lcars.purple, 0.4)
        color: colors.text.primary

id: test-theme-computed-tokens

---

# ----------------------------------------------------------------------------
# CARD 5: State Color Tokens (error, warning, success)
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: template

grid:
  grid-template-columns: 1fr 1fr 1fr
  gap: 10px

style:
  font_size: 16
  padding: 12px
  align: center

rows:
  # Header
  - values: ['Error', 'Warning', 'Success']
    style:
      background: colors.grid.headerBackground
      color: colors.grid.headerText
      font_weight: 700
  
  # State indicators
  - values: ['CRITICAL', 'CAUTION', 'OPTIMAL']
    cellStyles:
      - color: colors.grid.error
        background: alpha(colors.grid.error, 0.2)
        font_weight: 700
        border_width: 2
        border_color: colors.grid.error
        border_style: solid
      - color: colors.grid.warning
        background: alpha(colors.grid.warning, 0.2)
        font_weight: 700
        border_width: 2
        border_color: colors.grid.warning
        border_style: solid
      - color: colors.grid.success
        background: alpha(colors.grid.success, 0.2)
        font_weight: 700
        border_width: 2
        border_color: colors.grid.success
        border_style: solid

id: test-theme-state-tokens

---

# ----------------------------------------------------------------------------
# CARD 6: Mixed Token Sources
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: random
format: mixed

grid:
  grid-template-columns: repeat(8, 1fr)
  gap: 8px

# Mix of different token types
style:
  color: colors.grid.cellText        # Grid token
  font_size: 16
  padding: 8px

animation:
  type: cascade
  colors:
    start: colors.lcars.blue         # LCARS token
    text: darken(colors.lcars.blue, 0.3)  # Computed token
    end: colors.grid.cascadeEnd      # Grid token

id: test-theme-mixed-tokens
