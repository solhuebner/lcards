# Test LCARdS Configuration for Migration Testing

# Resources
resources:
  - url: /hacsfiles/lcards/lcards.js
    type: module

views:
  - title: Bridge
    cards:
      # Test button card
      - type: custom:lcards-button-card
        entity: light.bridge
        lcards_card_type: lcards-button-lozenge
        name: "BRIDGE"
        show_state: true
        tap_action:
          action: toggle

      # Test elbow card
      - type: custom:lcards-elbow-card
        lcards_card_type: lcards-elbow-left
        size: large
        color: orange

      # Test MSD card
      - type: custom:lcards-msd-card
        lcards-msd:
          version: 1
          base_svg:
            source: "builtin:enterprise-d"
          overlays:
            - id: bridge_status
              type: status_grid
              position: [200, 100]
              entities:
                - light.bridge_main
                - sensor.bridge_occupancy

      # Test multimeter
      - type: custom:lcards-multimeter-card
        entity: sensor.warp_core_temperature
        lcards_card_type: lcards-multimeter-radial
        show_name: true

  - title: Engineering
    cards:
      # Grid with multiple LCARdS cards
      - type: grid
        columns: 3
        cards:
          # Phase 2b Text Overlay with Layout Controls
          - type: custom:lcards-text-card
            text: "WARP CORE"
            style:
              fontSize: '18px'
              color: '#FFCC00'
            layout:
              text_align: 'center'
              vertical_align: 'middle'
              padding:
                top: 8
                bottom: 8

          # Phase 2b Button Overlay with Layout Controls
          - type: custom:lcards-button-card
            label: "EJECT"
            entity: button.warp_core_eject
            style:
              backgroundColor: '#CC0000'
              color: '#FFFFFF'
              fontSize: '14px'
            layout:
              text_align: 'center'
              vertical_align: 'middle'
              padding:
                top: 10
                right: 15
                bottom: 10
                left: 15
            action:
              tap:
                action: 'call-service'
                service: 'button.press'

          # Phase 2b Text with Different Layout
          - type: custom:lcards-text-card
            text: "STATUS: ONLINE"
            style:
              fontSize: '12px'
              color: '#00FF00'
            layout:
              text_align: 'left'
              vertical_align: 'top'
              padding:
                top: 5
                left: 10

          # Existing cards
          - type: custom:lcards-button-card
            lcards_card_type: lcards-button-picard
            entity: switch.warp_core
          - type: custom:lcards-label-card
            lcards_card_type: lcards-label-header
            text: "WARP CORE"
          - type: custom:lcards-elbow-card
            lcards_card_type: lcards-elbow-top-right