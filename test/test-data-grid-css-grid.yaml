# ============================================================================
# DATA GRID REFACTOR - CSS GRID PROPERTIES TEST
# ============================================================================
# Purpose: Test all standard CSS Grid property support
# Duration: 5 minutes
# Expected: Various grid layouts demonstrating CSS Grid capabilities
# ============================================================================

# ----------------------------------------------------------------------------
# CARD 1: Basic CSS Grid Properties
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: random
format: mixed

# NEW STANDARD CSS GRID FORMAT
grid:
  grid-template-columns: repeat(12, 1fr)
  grid-template-rows: repeat(6, auto)
  gap: 12px
  grid-auto-flow: row

style:
  font_size: 16
  color: colors.grid.cellText

animation:
  type: cascade
  pattern: fast

id: test-css-grid-basic

---

# ----------------------------------------------------------------------------
# CARD 2: Advanced Grid Properties
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: random
format: digit

grid:
  grid-template-columns: minmax(80px, 1fr) repeat(4, 2fr) minmax(80px, 1fr)
  grid-template-rows: repeat(8, 40px)
  gap: 16px
  grid-auto-flow: column
  justify-items: center
  align-items: center

style:
  font_size: 14
  color: colors.lcars.blue
  font_weight: 600

id: test-css-grid-advanced

---

# ----------------------------------------------------------------------------
# CARD 3: Mixed Column Widths
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: random
format: float

grid:
  grid-template-columns: 100px 1fr 2fr 1fr 100px
  grid-template-rows: repeat(6, auto)
  gap: 8px

style:
  font_size: 18
  color: colors.lcars.orange
  padding: 10px

animation:
  type: cascade
  pattern: niagara

id: test-css-grid-mixed

---

# ----------------------------------------------------------------------------
# CARD 4: Auto-fit Responsive Grid
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: random
format: alpha

grid:
  grid-template-columns: repeat(auto-fit, minmax(60px, 1fr))
  gap: 4px

style:
  font_size: 12
  color: colors.grid.cellText
  align: center

id: test-css-grid-autofit
