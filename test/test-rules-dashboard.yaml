## LCARdS Rules Dashboard Test Configuration
## 
## This configuration demonstrates the Rules Dashboard functionality
## Copy this to your Lovelace configuration to test the Rules tab in the editor

type: vertical-stack
cards:
  # Button card with rules targeting it by ID
  - type: custom:lcards-button
    id: button-with-rules
    entity: light.living_room
    label: Living Room Light
    style:
      color:
        default: "#ff9900"
        active: "#ffcc00"

# Global rules configuration (add to your lovelace config root)
# Copy this section to the root level of your lovelace config
rules:
  # Rule 1: Target specific button by ID
  - id: rule_night_mode
    target: button-with-rules
    conditions:
      all:
        - entity: sun.sun
          state: below_horizon
    actions:
      - type: modify_config
        config:
          style:
            color:
              default: "#0099ff"
              
  # Rule 2: Global rule (no target)
  - id: rule_morning_greeting
    conditions:
      all:
        - entity: sensor.time
          state: "07:00"
    actions:
      - type: notification
        message: "Good morning!"
        
  # Rule 3: Disabled rule
  - id: rule_disabled_example
    enabled: false
    target: button-with-rules
    conditions:
      any:
        - entity: sensor.temperature
          above: 25
    actions:
      - type: modify_config
        config:
          label: "Too Hot!"
          
  # Rule 4: Rule with multiple targets
  - id: rule_multi_target
    target:
      - button-with-rules
      - another-card-id
    conditions:
      not:
        - entity: binary_sensor.motion
          state: "on"
    actions:
      - type: animate
        animation: pulse
      - type: modify_config
        config:
          style:
            opacity: 0.5

  # Rule 5: Complex condition rule
  - id: rule_complex_conditions
    type: overlay
    conditions:
      all:
        - entity: climate.thermostat
          state: heating
        - entity: sensor.outside_temp
          below: 10
        - entity: binary_sensor.window_open
          state: "off"
    actions:
      - type: modify_config
        config:
          style:
            color:
              default: "#ff3300"

## Testing Instructions:
## 
## 1. Add the button card above to your dashboard
## 2. Add the rules section to your lovelace configuration root
## 3. Open the button card in the editor
## 4. Click on the "Rules" tab
## 5. Verify the following:
##    - Total Rules shows 5
##    - Targeting This Card shows 3 (rule_night_mode, rule_disabled_example, rule_multi_target)
##    - Enabled shows 4 (rule_disabled_example is disabled)
##    - Table shows all rule details correctly
##    - Sort functionality works for each column
##    - Highlighted rules are shown in the "Rules Targeting This Card" section
##    - Other rules are shown in the "All Rules in System" section
##    - Help section explains how to add rules
