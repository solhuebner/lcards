# Test: Legacy Mode Support - Old 'datasource' with timeline
# Verifies: Legacy mode name with timeline layout still works

type: custom:lcards-data-grid
data_mode: datasource  # Legacy name, should map to 'data'
layout: timeline
source: sensor.temperature
history_hours: 1
value_template: '{value:.1f}°C'
grid:
  grid-template-rows: repeat(4, auto)
  grid-template-columns: repeat(10, 1fr)
  gap: 4px
style:
  padding: 8px
  font_size: 16px
animation:
  type: cascade
