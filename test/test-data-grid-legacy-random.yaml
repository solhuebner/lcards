# Test: Legacy Mode Support - Old 'random' mode
# Verifies: Legacy mode name still works

type: custom:lcards-data-grid
data_mode: random  # Legacy name, should map to 'decorative'
format: mixed
refresh_interval: 2000
grid:
  grid-template-rows: repeat(6, auto)
  grid-template-columns: repeat(6, 1fr)
  gap: 4px
style:
  padding: 8px
  font_size: 20px
animation:
  type: cascade
