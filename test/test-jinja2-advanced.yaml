# Advanced Jinja2 Template Examples for LCARdS
#
# These showcase complex Jinja2 features that are only possible with server-side evaluation
#
# Features demonstrated:
# - Complex conditionals and logic
# - List comprehensions and filters
# - State aggregation across multiple entities
# - Time-based calculations
# - Custom formatting and string manipulation
# - Math operations and rounding

type: vertical-stack
cards:
  # Test 1: Multi-entity aggregation with conditionals
  - type: custom:lcards-button
    entity: light.tv
    preset: lozenge
    label: "Lights: {{states.light | selectattr('state','eq','on') | list | count}} on, {{states.light | selectattr('state','eq','off') | list | count}} off"
    # Counts all lights that are on/off across entire system
    # Expected: "Lights: 3 on, 5 off"

  # Test 2: Complex conditional with multiple states
  - type: custom:lcards-button
    entity: sensor.temperature
    preset: lozenge
    label: >-
      {% set temp = states('sensor.temperature') | float %}
      {% if temp > 25 %}🔥 Hot: {{temp}}°C
      {% elif temp > 20 %}☀️ Warm: {{temp}}°C
      {% elif temp > 15 %}🌤️ Mild: {{temp}}°C
      {% else %}❄️ Cold: {{temp}}°C
      {% endif %}
    # Conditional emoji based on temperature ranges
    # Expected: "☀️ Warm: 22.5°C" (or appropriate for current temp)

  # Test 3: Time-based greeting with calculations
  - type: custom:lcards-button
    entity: light.tv
    preset: lozenge
    label: >-
      {% set hour = now().hour %}
      {% if hour < 12 %}Good Morning ☀️
      {% elif hour < 17 %}Good Afternoon 🌤️
      {% elif hour < 21 %}Good Evening 🌆
      {% else %}Good Night 🌙
      {% endif %} - {{now().strftime('%H:%M')}}
    # Time-based greeting that changes throughout the day
    # Expected: "Good Afternoon 🌤️ - 14:30"

  # Test 4: List comprehension with filtering
  - type: custom:lcards-button
    entity: light.tv
    preset: lozenge
    label: "{{['kitchen','bedroom','living_room'] | map('regex_replace', '^', 'light.') | map('states') | select('eq','on') | list | count}}/3 zones active"
    # Dynamically checks multiple specific lights
    # Expected: "2/3 zones active"

  # Test 5: Complex math with rounding
  - type: custom:lcards-button
    entity: sensor.power
    preset: lozenge
    label: >-
      {% set watts = states('sensor.power') | float(0) %}
      {% set kwh = (watts / 1000) | round(2) %}
      {% set cost = (kwh * 0.15) | round(2) %}
      {{watts}}W = {{kwh}}kWh = ${{cost}}/hr
    # Power conversion with cost calculation
    # Expected: "750W = 0.75kWh = $0.11/hr"

  # Test 6: Relative time calculation
  - type: custom:lcards-button
    entity: light.tv
    preset: lozenge
    label: >-
      {% set last_changed = as_timestamp(states.light.tv.last_changed) %}
      {% set now_ts = as_timestamp(now()) %}
      {% set minutes = ((now_ts - last_changed) / 60) | int %}
      Changed {{minutes}} min ago
    # Shows how long ago entity state changed
    # Expected: "Changed 15 min ago"

  # Test 7: String manipulation and formatting
  - type: custom:lcards-button
    entity: light.tv
    preset: lozenge
    label: "{{state_attr('light.tv', 'friendly_name') | upper | replace(' ', '_')}} [{{states('light.tv') | upper}}]"
    # Complex string manipulation
    # Expected: "TV_LIGHT [ON]"

  # Test 8: Nested conditionals with state aggregation
  - type: custom:lcards-button
    entity: light.tv
    preset: lozenge
    label: >-
      {% set lights_on = states.light | selectattr('state','eq','on') | list | count %}
      {% set total_lights = states.light | list | count %}
      {% set percent = (lights_on / total_lights * 100) | round(0) | int %}
      {% if percent == 0 %}All Off 🌑
      {% elif percent < 25 %}Few On 🌘
      {% elif percent < 50 %}Some On 🌗
      {% elif percent < 75 %}Most On 🌖
      {% elif percent < 100 %}Nearly All 🌕
      {% else %}All On ☀️
      {% endif %} ({{percent}}%)
    # Shows lighting status as moon phase emoji with percentage
    # Expected: "Some On 🌗 (45%)"

  # Test 9: List operations with map/select
  - type: custom:lcards-button
    entity: light.tv
    preset: lozenge
    label: "Active: {{states.light | selectattr('state','eq','on') | map(attribute='name') | list | join(', ') | truncate(40, True, '...')}}"
    # Lists names of all lights that are on, truncated
    # Expected: "Active: Kitchen, Living Room, Bedr..."

  # Test 10: Advanced date/time formatting with calculations
  - type: custom:lcards-button
    entity: light.tv
    preset: lozenge
    label: >-
      {% set dt = now() %}
      {{dt.strftime('%A')[:3]}} {{dt.day}}/{{dt.month}} - Week {{dt.strftime('%U')}} - Day {{dt.strftime('%j')}}/365
    # Complex date formatting showing week of year and day of year
    # Expected: "Tue 12/11 - Week 45 - Day 317/365"

  # Test 11: Ternary operator with nested expressions
  - type: custom:lcards-button
    entity: sensor.temperature
    preset: lozenge
    label: "{{(states('sensor.temperature') | float > 20) | iif((states('sensor.temperature') | float | round(1)) ~ '°C ⚠️', (states('sensor.temperature') | float | round(1)) ~ '°C ✓')}}"
    # Inline if using iif filter with warning/check marks
    # Expected: "22.5°C ⚠️" or "18.5°C ✓"

  # Test 12: Complex state history (if available)
  - type: custom:lcards-button
    entity: light.tv
    preset: lozenge
    label: >-
      {% set on_time = states.light.tv.last_changed if states('light.tv') == 'on' else 'N/A' %}
      Status: {{states('light.tv') | upper}} {% if on_time != 'N/A' %}since {{on_time.strftime('%H:%M')}}{% endif %}
    # Shows current state and time of last state change
    # Expected: "Status: ON since 14:25"

# Testing Checklist:
# ✓ Multi-entity aggregation works
# ✓ Complex conditionals evaluate correctly
# ✓ List comprehensions and filters work
# ✓ Time-based logic works
# ✓ Math operations calculate correctly
# ✓ String manipulation functions work
# ✓ Nested templates evaluate
# ✓ State aggregation across entities
# ✓ Relative time calculations
# ✓ Advanced formatting
# ✓ Ternary operators (iif filter)
# ✓ Templates update in real-time when entities change
