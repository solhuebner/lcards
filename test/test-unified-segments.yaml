# Test configuration for Unified Segment Configuration
# Tests object-based schema for both D-pad and custom SVG segments

# Test 1: Custom SVG with auto-discovery and default inheritance
- type: custom:lcards-button
  entity: light.living_room
  svg:
    content: |
      <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
        <rect id="zone1" x="0" y="0" width="90" height="90" fill="#6688aa" />
        <rect id="zone2" x="110" y="0" width="90" height="90" fill="#6688aa" />
      </svg>
    segments:
      default:
        style:
          fill:
            default: "#6688aa"
            active: "#ff9900"
            inactive: "#444444"
      zone1:
        entity: light.living_room
        tap_action:
          action: toggle
      zone2:
        entity: light.kitchen
        tap_action:
          action: toggle

# Test 2: Custom SVG with manual selector (no ID)
- type: custom:lcards-button
  entity: light.bedroom
  svg:
    content: |
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle class="button" cx="50" cy="50" r="40" fill="#6688aa" />
      </svg>
    segments:
      my-button:
        selector: ".button"
        tap_action:
          action: toggle

# Test 3: D-pad with default inheritance (existing format, should still work)
- type: custom:lcards-button
  component: dpad
  entity: media_player.living_room
  dpad:
    segments:
      default:
        style:
          fill:
            active: "#ff9900"
            inactive: "#6688aa"
      center:
        tap_action:
          action: call-service
          service: media_player.media_play_pause
      up:
        tap_action:
          action: call-service
          service: media_player.volume_up
      down:
        tap_action:
          action: call-service
          service: media_player.volume_down

# Test 4: Mixed configured and unconfigured segments
- type: custom:lcards-button
  svg:
    content: |
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect id="btn1" x="0" y="0" width="45" height="45" fill="#6688aa" />
        <rect id="btn2" x="55" y="0" width="45" height="45" fill="#6688aa" />
        <rect id="btn3" x="0" y="55" width="45" height="45" fill="#6688aa" />
        <rect id="btn4" x="55" y="55" width="45" height="45" fill="#6688aa" />
      </svg>
    segments:
      default:
        style:
          fill:
            default: "#6688aa"
            hover: "#ffcc99"
      btn1:
        entity: light.room_1
        tap_action:
          action: toggle
      # btn2, btn3, btn4 inherit default (no actions, just styling).

# Test 5: SVG with only default config (no specific segments)
- type: custom:lcards-button
  svg:
    content: |
      <svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
        <rect id="button" x="10" y="10" width="80" height="30" fill="#6688aa" />
      </svg>
    segments:
      default:
        style:
          fill:
            default: "#6688aa"
            active: "#ff9900"
