# ============================================================================
# DATA GRID REFACTOR - BASIC FUNCTIONALITY TEST
# ============================================================================
# Purpose: Verify backward compatibility with existing configurations
# Duration: 2 minutes
# Expected: Grid renders correctly with deprecation warning in console
# ============================================================================

type: custom:lcards-data-grid
data_mode: random
format: hex

# OLD SHORTHAND FORMAT (should trigger deprecation warning)
grid:
  rows: 8
  columns: 12
  gap: 8
  cell_width: auto

# Basic styling (old format)
font_size: 18
font_family: "'Antonio', 'Helvetica Neue', sans-serif"
font_weight: 400
align: right
color: '#99ccff'

# Basic cascade animation
animation:
  type: cascade
  pattern: default
  colors:
    start: '#99ccff'
    text: '#4466aa'
    end: '#aaccff'

# Card metadata
id: test-data-grid-basic
