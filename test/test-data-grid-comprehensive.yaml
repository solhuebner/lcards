# ============================================================================
# DATA GRID REFACTOR - COMPREHENSIVE INTEGRATION TEST
# ============================================================================
# Purpose: Test all features working together in realistic scenarios
# Duration: 15 minutes
# Expected: All features integrate seamlessly without conflicts
# ============================================================================

# ----------------------------------------------------------------------------
# CARD 1: Random Mode + Full Styling + CSS Grid + Animation
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: random
format: hex

# Standard CSS Grid
grid:
  grid-template-columns: repeat(12, 1fr)
  grid-template-rows: repeat(8, 45px)
  gap: 10px
  justify-items: center
  align-items: center

# Hierarchical styling with theme tokens
style:
  color: colors.grid.cellText
  background: alpha(colors.grid.cellBackground, 0.05)
  font_size: 18
  font_weight: 500
  padding: 8px
  border_width: 1
  border_color: colors.grid.border
  border_style: solid
  align: center

# Cascade animation with theme tokens
animation:
  type: cascade
  pattern: default
  colors:
    start: colors.grid.cascadeStart
    text: colors.grid.cascadeMid
    end: colors.grid.cascadeEnd
  cell_stagger: 30

# Change detection
  highlight_changes: true
  change_preset: pulse
  change_duration: 600
  change_params:
    max_scale: 1.08
    min_opacity: 0.75

refresh_interval: 5000

id: test-comprehensive-random

---

# ----------------------------------------------------------------------------
# CARD 2: Template Mode + Full Hierarchy + Entity States
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: template

grid:
  grid-template-columns: 140px 1fr 100px 80px
  gap: 8px

# Grid defaults with theme tokens
style:
  font_size: 14
  color: colors.grid.cellText
  padding: 8px
  align: left

rows:
  # Header row with full styling
  - values: ['System', 'Status', 'Temperature', 'Power']
    style:
      background: colors.grid.headerBackground
      color: colors.grid.headerText
      font_weight: 700
      text_transform: uppercase
      padding: 12px 8px
      border_bottom_width: 2
      border_bottom_color: colors.grid.divider
      border_bottom_style: solid
    cellStyles:
      - null
      - null
      - align: center
      - align: center
  
  # Data rows with entity templates and hierarchical styling
  - values:
      - 'Main Computer'
      - 'OPERATIONAL'
      - '{{states("sensor.processor_temperature")|default("N/A")}}°C'
      - '{{states("sensor.system_power")|default("N/A")}}W'
    style:
      background: alpha(colors.lcars.blue, 0.05)
    cellStyles:
      - color: colors.lcars.blue
        font_weight: 600
      - color: colors.grid.success
        font_weight: 600
      - align: center
        color: colors.grid.cellText
      - align: center
        color: colors.lcars.orange
        font_weight: 500
  
  - values:
      - 'Life Support'
      - 'OPTIMAL'
      - '{{states("sensor.cpu_temperature")|default("N/A")}}°C'
      - '{{states("sensor.living_room_power")|default("N/A")}}W'
    cellStyles:
      - color: colors.lcars.green
        font_weight: 600
      - color: colors.grid.success
        font_weight: 600
      - align: center
      - align: center
        color: colors.lcars.orange
        font_weight: 500
  
  - values:
      - 'Shields'
      - 'CHARGING'
      - '{{states("sensor.disk_temperature")|default("N/A")}}°C'
      - '{{states("sensor.bedroom_power")|default("N/A")}}W'
    style:
      background: alpha(colors.grid.warning, 0.05)
    cellStyles:
      - color: colors.lcars.orange
        font_weight: 600
      - color: colors.grid.warning
        font_weight: 600
      - align: center
      - align: center
        color: colors.lcars.orange
        font_weight: 500
  
  # Alert row
  - values:
      - 'Warp Core'
      - 'WARNING'
      - 'CRITICAL'
      - 'OVERLOAD'
    style:
      background: alpha(colors.grid.error, 0.2)
      color: colors.grid.error
      font_weight: 600
    cellStyles:
      - font_weight: 700
      - font_weight: 700
        background: alpha(colors.grid.error, 0.3)
        border_width: 2
        border_color: colors.grid.error
        border_style: solid
      - align: center
        font_weight: 700
      - align: center
        font_weight: 700

animation:
  type: cascade
  pattern: fast
  colors:
    start: colors.grid.cascadeStart
    text: colors.grid.cascadeMid
    end: colors.grid.cascadeEnd

id: test-comprehensive-template

---

# ----------------------------------------------------------------------------
# CARD 3: Performance Test - Large Grid with Caching
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: random
format: digit

# Large grid to test performance
grid:
  grid-template-columns: repeat(20, 1fr)
  grid-template-rows: repeat(20, 35px)
  gap: 4px

# Complex styling to test cache effectiveness
style:
  color: colors.grid.cellText
  background: alpha(colors.grid.cellBackground, 0.02)
  font_size: 12
  font_weight: 400
  padding: 6px
  border_width: 1
  border_color: alpha(colors.grid.border, 0.3)
  border_style: solid
  align: center

animation:
  type: cascade
  pattern: fast
  colors:
    start: colors.grid.cascadeStart
    text: colors.grid.cascadeMid
    end: colors.grid.cascadeEnd

refresh_interval: 10000

id: test-comprehensive-performance

---

# ----------------------------------------------------------------------------
# CARD 4: Edge Cases - Empty Cells, Missing Tokens, Fallbacks
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: template

grid:
  grid-template-columns: 1fr 1fr 1fr 1fr
  gap: 8px

style:
  font_size: 16
  color: colors.grid.cellText
  padding: 8px

rows:
  # Normal row
  - values: ['Cell 1', 'Cell 2', 'Cell 3', 'Cell 4']
  
  # Row with empty cells
  - values: ['', 'Not Empty', '', 'Also Not Empty']
  
  # Row with null values
  - values: [null, 'Value', null, 'Another Value']
  
  # Row with mixed styling (some with style, some without)
  - values: ['Styled', 'Default', 'Styled', 'Default']
    cellStyles:
      - color: colors.lcars.blue
        font_weight: 600
      - null
      - color: colors.lcars.orange
        font_weight: 600
      - null
  
  # Row testing fallbacks
  - values: ['Test 1', 'Test 2', 'Test 3', 'Test 4']
    style:
      background: alpha(colors.grid.rowAlt, 1.0)

id: test-comprehensive-edge-cases

---

# ----------------------------------------------------------------------------
# CARD 5: Complex CSS Grid Layout
# ----------------------------------------------------------------------------
type: custom:lcards-data-grid
data_mode: template

# Advanced CSS Grid with spanning
grid:
  grid-template-columns: 100px 1fr 1fr 100px
  grid-template-rows: 40px repeat(4, auto)
  gap: 12px
  grid-auto-flow: row dense

style:
  font_size: 14
  color: colors.grid.cellText
  padding: 10px
  align: left

rows:
  # Wide header spanning conceptually
  - values: ['ID', 'Description', 'Value', 'Status']
    style:
      background: colors.grid.headerBackground
      color: colors.grid.headerText
      font_weight: 700
      text_transform: uppercase
      border_bottom_width: 2
      border_bottom_color: colors.grid.divider
      border_bottom_style: solid
    cellStyles:
      - align: center
      - null
      - align: center
      - align: center
  
  # Data rows with varying content lengths
  - values: ['001', 'Primary Systems Controller', '100%', 'OK']
    cellStyles:
      - align: center
        font_weight: 600
      - null
      - align: center
        color: colors.grid.success
        font_weight: 600
      - align: center
        color: colors.grid.success
  
  - values: ['002', 'Secondary Backup Array', '85%', 'OK']
    style:
      background: alpha(colors.grid.rowAlt, 1.0)
    cellStyles:
      - align: center
        font_weight: 600
      - null
      - align: center
        color: colors.lcars.blue
        font_weight: 600
      - align: center
        color: colors.grid.success
  
  - values: ['003', 'Tertiary Emergency System', '50%', 'WARN']
    cellStyles:
      - align: center
        font_weight: 600
      - null
      - align: center
        color: colors.grid.warning
        font_weight: 600
      - align: center
        color: colors.grid.warning
        font_weight: 700
  
  - values: ['004', 'Quantum Processing Unit', 'OFFLINE', 'ERROR']
    style:
      background: alpha(colors.grid.error, 0.1)
    cellStyles:
      - align: center
        font_weight: 600
      - color: colors.grid.error
      - align: center
        color: colors.grid.error
        font_weight: 700
      - align: center
        color: colors.grid.error
        font_weight: 900
        background: alpha(colors.grid.error, 0.2)

animation:
  type: cascade
  pattern: niagara
  colors:
    start: colors.grid.cascadeStart
    text: colors.grid.cascadeMid
    end: colors.grid.cascadeEnd

id: test-comprehensive-complex-layout
