# Test Control Overlay Schema Validation
# Tests for single nested card pattern enforcement

# ✅ TEST 1: Correct pattern - nested card with flat properties
type: custom:lcards-msd
msd:
  base_svg:
    source: 'none'
  view_box: [0, 0, 1920, 1080]
  overlays:
    - type: control
      id: test_correct_flat
      card:
        type: button
        entity: light.test
        name: "Test Light"
      position: [100, 100]
      size: [200, 100]

---

# ✅ TEST 2: Correct pattern - nested card with nested config
type: custom:lcards-msd
msd:
  base_svg:
    source: 'none'
  view_box: [0, 0, 1920, 1080]
  overlays:
    - type: control
      id: test_correct_nested
      card:
        type: button
        config:
          entity: light.test
          name: "Test Light"
      position: [100, 100]
      size: [200, 100]

---

# ✅ TEST 3: Correct pattern - LCARdS card
type: custom:lcards-msd
msd:
  base_svg:
    source: 'none'
  view_box: [0, 0, 1920, 1080]
  overlays:
    - type: control
      id: test_correct_lcards
      card:
        type: custom:lcards-button
        entity: switch.test
        preset: lozenge
        text:
          label:
            content: "TEST"
      position: [100, 100]
      size: [200, 180]

---

