# LCARdS Phase 2b Layout Controls Test Configuration
# This config tests the CSS-style layout controls (text_align, vertical_align, padding)

# Text overlay with different alignments
type: custom:lcards-text-card
text: "Left Top"
style:
  fontSize: '16px'
  color: '#FFCC00'
layout:
  text_align: 'left'
  vertical_align: 'top'
  padding:
    top: 10
    left: 15

---

type: custom:lcards-text-card
text: "Center Middle"
style:
  fontSize: '18px'
  color: '#FF6600'
layout:
  text_align: 'center'
  vertical_align: 'middle'
  padding:
    top: 5
    right: 10
    bottom: 5
    left: 10

---

type: custom:lcards-text-card
text: "Right Bottom"
style:
  fontSize: '14px'
  color: '#0099CC'
layout:
  text_align: 'right'
  vertical_align: 'bottom'
  padding:
    bottom: 8
    right: 12

---

# Button overlays with different layouts
type: custom:lcards-button-card
label: "Top Left Button"
entity: light.test_light
style:
  backgroundColor: '#FF9900'
  color: '#FFFFFF'
  fontSize: '14px'
layout:
  text_align: 'left'
  vertical_align: 'top'
  padding:
    top: 8
    left: 12
action:
  tap:
    action: 'toggle'

---

type: custom:lcards-button-card
label: "Centered"
entity: light.test_light
style:
  backgroundColor: '#0099CC'
  color: '#FFFFFF'
  fontSize: '16px'
layout:
  text_align: 'center'
  vertical_align: 'middle'
  padding:
    top: 10
    right: 15
    bottom: 10
    left: 15
action:
  tap:
    action: 'toggle'

---

type: custom:lcards-button-card
label: "Bottom Right"
entity: light.test_light
style:
  backgroundColor: '#CC0066'
  color: '#FFFFFF'
  fontSize: '12px'
layout:
  text_align: 'right'
  vertical_align: 'bottom'
  padding:
    bottom: 6
    right: 10
action:
  tap:
    action: 'toggle'