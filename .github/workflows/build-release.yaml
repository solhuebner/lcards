name: Build Release

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'package.json'

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'
        type: string
      prerelease:
        description: 'Publish as pre-release'
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_tag.outputs.should_release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "⚠️  Tag v$VERSION already exists - skipping"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "✅ Tag v$VERSION does not exist - proceeding"
          fi

      - name: Setup Node.js
        if: steps.check_tag.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check_tag.outputs.should_release == 'true'
        run: npm ci

      - name: Build
        if: steps.check_tag.outputs.should_release == 'true'
        run: npm run build

      - name: Prepare dist package
        if: steps.check_tag.outputs.should_release == 'true'
        run: |
          mkdir -p ./dist
          cp -Rv ./src/assets/fonts  ./dist/
          cp -Rv ./src/assets/msd    ./dist/
          cp -Rv ./src/assets/sounds ./dist/
          cp hacs.json  ./dist/
          cp README.md  ./dist/
          echo "✅ dist contents:"
          ls -la ./dist/

      - name: Upload dist artifact
        if: steps.check_tag.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lcards-dist-${{ steps.get_version.outputs.version }}
          path: ./dist
          retention-days: 30

      - name: Commit dist to branch
        if: steps.check_tag.outputs.should_release == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update dist for v${{ steps.get_version.outputs.version }}"
          committer_name: GitHub Actions
          committer_email: 41898282+github-actions[bot]@users.noreply.github.com
          add: './dist --force'

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.should_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'msd-globalisation' }}
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: lcards-dist-${{ needs.build.outputs.version }}
          path: ./dist

      - name: Generate changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          {
            echo "## What's Changed"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges | head -30
              echo ""
              echo ""
              echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION}"
            else
              echo "Initial release."
            fi
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create zip archive
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          cd dist && zip -r ../lcards-${VERSION}.zip . && cd ..

      - name: Create Git tag
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          git config user.name "GitHub Actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.build.outputs.version }}"
          name: "v${{ needs.build.outputs.version }}"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' || contains(needs.build.outputs.version, 'alpha') || contains(needs.build.outputs.version, 'beta') }}
          files: lcards-${{ needs.build.outputs.version }}.zip

      - name: Summary
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          IS_PRE="${{ github.event.inputs.prerelease }}"
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          {
            echo "## ✅ Release Created"
            echo ""
            echo "**Version:** v$VERSION"
            echo "**Pre-release:** $IS_PRE"
            echo "**Branch:** $BRANCH"
          } >> $GITHUB_STEP_SUMMARY
