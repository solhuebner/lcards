name: Validate

on:
  push:
    branches: [ "main", "dev", "develop" ]
  pull_request:
    branches: [ "main", "dev", "develop" ]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate-hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: "plugin"

  validate-build:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -f "dist/lcards.js" ]; then
            echo "❌ Build failed: dist/lcards.js not found"
            exit 1
          fi
          echo "✅ Build successful"
          ls -lh dist/lcards.js

  validate-version:
    name: Validate Version Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check version format
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "Current version: $VERSION"

          if ! [[ "$VERSION" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]+(-[a-zA-Z][a-zA-Z0-9]*(\.[0-9]+)?)?$ ]]; then
            echo "❌ Error: Version must follow format YYYY.MM.X (e.g., 2026.02.1) with optional suffix (e.g., 2026.03.17-alpha, 2026.03.17-rc.1)"
            echo "   Current version: $VERSION"
            exit 1
          fi

          echo "✅ Version format is valid"

  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          ERRORS=0

          # Check critical files
          FILES=(
            "package.json"
            "hacs.json"
            "README.md"
            "LICENSE"
            "src/lcards.js"
            "src/assets"
          )

          for FILE in "${FILES[@]}"; do
            if [ ! -e "$FILE" ]; then
              echo "❌ Missing: $FILE"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ Found: $FILE"
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS required file(s) missing"
            exit 1
          fi

          echo "✅ All required files present"
