name: Validate

on:
  push:
    branches: [ "main", "dev", "develop" ]
  pull_request:
    branches: [ "main", "dev", "develop" ]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate-hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: "integration"

  validate-build:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build:integration

      - name: Check build output
        run: |
          ERRORS=0
          if [ ! -f "custom_components/lcards/lcards.js" ]; then
            echo "❌ Build failed: custom_components/lcards/lcards.js not found"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ lcards.js — $(du -sh custom_components/lcards/lcards.js | cut -f1)"
          fi
          for DIR in fonts msd sounds; do
            if [ ! -d "custom_components/lcards/$DIR" ]; then
              echo "❌ Missing asset dir: custom_components/lcards/$DIR"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ assets/$DIR present"
            fi
          done
          [ $ERRORS -eq 0 ] || exit 1

  validate-version:
    name: Validate Version Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check version format
        run: |
          # Format: YYYY.MM.D[.SEQ][-suffix]
          # e.g. 2026.03.27  2026.03.27.1  2026.03.27-alpha.1  2026.03.27.1-rc.2
          VERSION=$(jq -r '.version' package.json)
          echo "package.json version: $VERSION"

          if ! [[ "$VERSION" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]+(\.[0-9]+)?(-[a-zA-Z][a-zA-Z0-9]*(\.[0-9]+)?)?$ ]]; then
            echo "❌ Version must follow format YYYY.MM.D[.SEQ] with optional pre-release suffix"
            echo "   Examples: 2026.03.27  2026.03.27.1  2026.03.27-alpha.1  2026.03.27.1-rc.2"
            exit 1
          fi

          echo "✅ Version format is valid: $VERSION"

  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          ERRORS=0

          # Check critical files
          FILES=(
            "package.json"
            "hacs.json"
            "README.md"
            "LICENSE"
            "src/lcards.js"
            "src/assets"
            "custom_components/lcards/__init__.py"
            "custom_components/lcards/manifest.json"
            "custom_components/lcards/config_flow.py"
            "custom_components/lcards/frontend.py"
            "custom_components/lcards/websocket_api.py"
            "custom_components/lcards/const.py"
          )

          for FILE in "${FILES[@]}"; do
            if [ ! -e "$FILE" ]; then
              echo "❌ Missing: $FILE"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ Found: $FILE"
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS required file(s) missing"
            exit 1
          fi

          echo "✅ All required files present"
