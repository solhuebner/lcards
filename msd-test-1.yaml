type: custom:lcards-msd-card
grid_options:
  columns: full
  rows: 5
msd:
  theme: lcars-classic
  version: 1
  debug:
    scale: 1.4
    enabled: true
    overlays:
      anchors: false
      bounding_boxes: true
      routing: true
      performance: false
    console:
      verbose: true
      timing: true
    hud:
      auto_show: false
  base_svg:
    source0: none
    source: builtin:ncc-1701-a-blue
    filters2:
      blur: 3px
    filter_preset3: red-alert
    filters:
      opacity: 0.7
      brightness: 1.2
      hue_rotate: 45
      saturate: 1.5
      blur: 5px
  view_box: auto
  view_box1:
    - 0
    - 0
    - 1920
    - 1080
  use_packs:
    builtin:
      - core
      - cb_lcars_buttons
  anchors:
    debug_anchor_1:
      - 300
      - 200
    debug_anchor_2:
      - 600
      - 300
    debug_anchor_3:
      - 480
      - 600
    debug_anchor_4:
      - 1440
      - 300
    performance_test:
      - 100
      - 100
  data_sources:
    temperature:
      entity: sensor.toronto_feels_like_temperature
      metadata:
        area: Living Room
        friendly_name: Yaaas
      debug: true
    temp_range:
      entity: sensor.toronto_feels_like_temperature
      windowSeconds: 86400
      history:
        enabled: true
        hours: 24
      aggregations:
        - type: rolling_statistics
          key: hourly_range
          window: 24h
          stats:
            - min
            - max
          output_format: array
        - type: rolling_statistics_series
          key: test_series
          window: 1h
          interval: 5m
          stats:
            - min
            - max
          max_points: 50
    weather_forecast:
      entity: weather.home
      attribute_path: forecast.0.temperature
    hvac_complete:
      entity: climate.therm1
      periodic_update_interval: 150000
      enum_mapping:
        "off": 0
        heat: 1
        cool: 2
      transformations:
        - type: expression
          key: is_heating
          expression: "value === 1 ? 100 : 0"
      aggregations:
        - type: duration
          key: heating_time
          condition: equals
          threshold: 1
          units: minutes
    hvac_state_test:
      entity: climate.therm1
      enum_mapping:
        "off": 0
        heat: 1
        cool: 2
        fan_only: 3
        dry: 4
        auto: 5
        heat_cool: 6
        idle: 0
      enum_mapping_debug: true
      transformations:
        - type: smooth
          method: exponential
          alpha: 0.5
          key: smoothed
        - type: expression
          key: is_error
          expression: "value === 1 ? 1 : 0"
    test_aggregations:
      entity: sensor.desk_sensor_illuminance
      transformations:
        - type: scale
          input_range:
            - 0
            - 100
          output_range:
            - 0
            - 1
          key: normalized
      aggregations:
        - type: min_max
          key: stats_1h
          window: 1h
          min: true
          max: true
          avg: true
        - type: moving_average
          key: avg_10
          window_size: 10
        - type: rate_of_change
          key: rate
          unit: per_minute
        - type: recent_trend
          key: trend
          samples: 20
        - type: min_max
          key: normalized_stats
          input_source: normalized
          window: 1h
          min: true
          max: true
    temperature_chain:
      type: entity
      entity: sensor.toronto_feels_like_temperature
      history:
        preload: true
        hours: 24
      transformations:
        - type: unit_conversion
          conversion: c_to_f
          key: fahrenheit
          debug: true
        - type: scale
          input_source: fahrenheit
          input_range:
            - 32
            - 95
          output_range:
            - 0
            - 100
          key: comfort_percent
          debug: true
        - type: smooth
          input_source: comfort_percent
          method: exponential
          alpha: 0.3
          key: comfort_smooth
          debug: true
      aggregations:
        - key: daily_stats
          type: min_max
          min: true
          max: true
          input_source: comfort_percent
          window: 24h
        - key: comfort_trend
          type: recent_trend
          input_source: comfort_smooth
          samples: 10
    battery_analysis:
      type: entity
      entity: sensor.bathroom_dial_battery
      history:
        preload: true
        hours: 24
      transformations:
        - type: smooth
          method: exponential
          alpha: 0.2
          key: smoothed_raw
          debug: true
        - type: scale
          input_range:
            - 0
            - 100
          output_range:
            - 0
            - 1
          key: normalized
          debug: true
        - type: smooth
          input_source: normalized
          method: moving_average
          window_size: 5
          key: normalized_smooth
          debug: true
      aggregations:
        - key: trend_raw
          type: recent_trend
          samples: 10
        - key: trend_smooth
          type: recent_trend
          input_source: normalized_smooth
          samples: 10
    battery_health:
      type: entity
      entity: sensor.bedroom_dial_battery
      history:
        preload: true
        hours: 24
      transformations:
        - type: smooth
          method: exponential
          alpha: 0.05
          key: baseline
        - type: expression
          expression: Math.abs(value - (transforms.baseline || value))
          key: deviation
          debug: true
        - type: expression
          input_source: deviation
          expression: (value / (transforms.baseline || 100)) * 100
          key: deviation_percent
          debug: true
        - type: smooth
          input_source: deviation_percent
          method: moving_average
          window_size: 3
          key: deviation_smooth
      aggregations:
        - key: deviation_stats
          type: min_max
          input_source: deviation_smooth
          min: true
          max: true
          avg: true
          window: 1h
    signal_processing:
      type: entity
      entity: sensor.bathroom_dial_battery
      history:
        preload: true
        hours: 24
      transformations:
        - type: smooth
          method: median
          window_size: 3
          key: outliers_removed
          debug: true
        - type: smooth
          input_source: outliers_removed
          method: moving_average
          window_size: 5
          key: noise_reduced
          debug: true
        - type: smooth
          input_source: noise_reduced
          method: exponential
          alpha: 0.1
          key: trend
          debug: true
        - type: expression
          expression: (transforms.noise_reduced || value) - (transforms.trend || 0)
          key: residual
          debug: true
        - type: statistical
          input_source: residual
          method: std_dev
          window_size: 20
          key: noise_level
      aggregations:
        - key: signal_quality
          type: min_max
          input_source: noise_level
          min: true
          max: true
          avg: true
  overlays:
    - id: test_tap_builtin
      type: button
      position:
        - 50
        - 150
      size:
        - 200
        - 68
      texts:
        - content: MY LABEL
          position: bottom-right
      style:
        lcars_button_preset: lozenge
      animations:
        - preset: glow
          trigger: on_tap
          duration: 500
          color: var(--lcars-pink)
    - id: hvac-status
      type: text
      text: >-
        HVAC: {hvac_complete.v} | Heating:
        {hvac_complete.transformations.is_heating}%
      position:
        - 1000
        - 10
      style:
        font_size: 24
        color: "#ff9900"
    - id: heating-duration
      type: text
      text: "On for: {hvac_complete.aggregations.heating_time.current:.1f} min"
      position:
        - 500
        - 50
      style:
        font_size: 24
        color: "#ff9900"
    - id: hvac-state-text
      type: text
      text: "HVAC: {hvac_state_test.v}"
      position:
        - 300
        - 120
      style:
        font_size: 24
        color: "#ff9900"
    - type: apexchart
      id: apex_area1
      position:
        - 0
        - 400
      size:
        - 400
        - 200
      style:
        chart_type: rangeArea
      source: temp_range.aggregations.temp_history
    - id: apex_animation1
      type: apexchart2
      style:
        chart_type: line
        background_color: components.button.defaultColor
        stroke_color: var(--lcars-blue)
        grid_color: rgba(255,255,255,0.2)
      animation_preset: lcars_dramatic
      source: battery_analysis
      position:
        - 0
        - 400
      size:
        - 400
        - 200
    - id: token_test_grid
      type: status_grid
      position:
        - 50
        - 650
      size:
        - 300
        - 200
      rows: 3
      columns: 3
      lcars_button_preset: lozenge
      style:
        border:
          color: colors.ui.border
        label_color: colors.ui.foreground
        cell_radius: borders.radius.lg
        font_family: typography.fontFamily.primary
        font_size: typography.fontSize.base
        label_font_size: typography.fontSize.lg
        value_font_size: typography.fontSize.sm
        hover_color: colors.status.warning
      cells:
        - id: cell1
          position:
            - 0
            - 0
          label: cell1
          content: cell 1 shit
          style:
            cell_color: colors.status.success
        - id: cell2
          position:
            - 0
            - 1
          label: cell2
          content: cell 2 shit
    - id: temp_apex_chart
      type: apexchart
      source:
        - temperature_chain
      position:
        - 600
        - 850
      size:
        - 600
        - 380
      style:
        chart_type: line
        color: var(--lcars-blue)
        stroke_width: 4
        smoothing_mode2: smooth
        time_window: 24h
        max_points2: 500
        show_grid: true
        show_axis: false
        show_tooltip: true
    - id: bedroom_status_grid
      type: status_grid
      position:
        - 100
        - 850
      size:
        - 360
        - 150
      style:
        rows: 2
        columns: 2
        preset: lozenge
        lcars_button_preset: bullet
        cell_color: var(--lcars-blue)
        cell_gap: 10
      cells:
        - id: bed_light_cell
          position:
            - 0
            - 0
          lcars_button_preset: lozenge
          label: Bed Light
          content: "{{states('light.tv')}} status"
          style:
            border:
              width: 6
              color: var(--picard-blue)
              radius: 0
          tap_action:
            action: toggle
            entity: light.tv
        - id: room_temp_cell
          position:
            - 0
            - 1
          label: Brightness
          content: "{{state_attr('light.tv','brightness')}}°C"
        - id: humidity_cell
          position:
            - 1
            - 0
          label: Humidity
          content: "{{states('sensor.desk_sensor_temperature')}}%"
        - id: air_quality_cell
          position:
            - 1
            - 1
          label: Air Quality
          content: "{{states('sensor.bedroom_dial_battery')}}"
    - id: emergency_button
      type: button
      position:
        - 800
        - 600
      size:
        - 280
        - 150
      label2: EMERGENCY
      content2: LOCKDOWN
      texts:
        - content: REACTOR
          position: top-left
          font_size: 14
        - content: ONLINE
          position: center
          font_size: 24
          font_weight: bold
        - content: 100%
          position: bottom-right
          font_size: 16
          color: var(--lcars-green)
      tap_action:
        action: toggle
        entity: light.tv
      hold_action:
        action: more-info
        entity: light.tv
      style:
        label_position: top-right
        border:
          top:
            width: 12
            color: var(--lcars-blue)
          right:
            width: 6
            color: var(--lcars-orange)
          bottom:
            width: 6
            color: var(--lcars-red)
          left:
            width: 12
            color: var(--lcars-orange)
          radius_top_left: 34
          radius_top_right: 17
          radius_bottom_right: 34
          radius_bottom_left: 17
        color: colors.status.success
        label_color: var(--lcars-red)
        value_color: var(--lcars-orange)
    - id: test_button1
      type: button
      position:
        - 1400
        - 1000
      size:
        - 120
        - 56
      label: TEST
      content: SHIZZ
      tap_action:
        action: toggle
        entity: light.tv
      style:
        border:
          width: 14
          color: var(--picard-blue)
          radius: 0
          bottom:
            width: 7
            color: var(--picard-lightest-blue)
        label_color: var(--lcars-red)
        value_color: var(--lcars-orange)
    - id: test_grid
      type: status_grid
      position:
        - 1500
        - 0
      size:
        - 300
        - 200
      rows: 2
      columns: 2
      style:
        lcars_button_preset: bullet
        cell_color: var(--lcars-blue)
      cells:
        - id: cell_1
          label: cellllz
          content: shit
          style:
            lcars_button_preset: lozenge
            label_position: top-left
            border:
              radius_top_left: 12
              radius_top_right: 4
              radius_bottom_right: 12
              radius_bottom_left: 4
        - id: cell_2
          content: bruh
          style:
            cell_color: colors.status.success
        - id: cell_3
          content: fkme
    - type: status_grid2
      tap_action:
        action: toggle
        entity: light.floor_lamp
      double_tap_action:
        action: more-info
        entity: light.floor_lamp
      hold_action:
        action: toggle
        entity: light.tv
      position:
        - 1500
        - 0
      size:
        - 300
        - 200
      lcars_button_preset: lozenge
      rows: 2
      columns: 2
      cells:
        - id: temp_cell
          lcars_button_preset: lozenge
          position:
            - 0
            - 0
          label: Temp
          content: "{temperature_chain.transformations.celsius:.1f}°C"
        - id: cpu_cell
          position:
            - 0
            - 1
          label: CPU
          content: "{test_cpu_temp:.1%}"
        - id: memory_cell
          position:
            - 1
            - 0
          label: Memory
          content: "{test_memory:.1%}"
        - id: status_cell
          position:
            - 1
            - 1
          label: Status
          content: "{test_cpu_temp > 70 ? 'HOT' : 'OK'}"
          tap_action:
            action: toggle
            entity: light.island
          hold_action:
            action: more-info
            entity: light.island
          double_tap_action:
            action: more-info
            entity: light.floor_lamp
    - id: test_text
      type: text
      content: ENGINE STATUS TESTING
      position:
        - 100
        - 100
      style:
        color: colors.accent.primary
        font_size: typography.fontSize.2xl
    - id: title_overlay
      tap_action:
        action: toggle
        entity: light.tv
      double_tap_action:
        action: more-info
        entity: light.floor_lamp
      hold_action:
        action: toggle
        entity: light.tv
      type: text
      position:
        - 50
        - 25
      content: "Temperature: {temperature_chain:.1f}   °C - {test_cpu_temp:%}"
      style:
        multiline: false
        status_indicator: var(--lcars-african-violet)
        status_indicator_position: right
        status_indicator_padding: 10
        text_anchor: left
        color: var(--lcars-blue)
        font_size1: 28
        font_size:
          value: 28
          scale: viewbox
          unit: px
        font_weight: bold
        glow:
          color: var(--lcars-orange)
          blur: 30
          intensity: 10
    - id: control1
      type: control
      card:
        show_name: true
        show_icon: true
        type: button
        entity: light.tv
        show_state: false
      position:
        - 1250
        - 20
      size:
        - 120
        - 80
    - id: control2
      type: control
      card:
        type: button
        config:
          show_name: true
          show_icon: true
          type: button
          entity: light.island
          show_state: true
      position:
        - 1250
        - 120
      size:
        - 120
        - 80
    - id: attach_test1
      type: line
      attach_to: title_overlay
      anchor: scr_nw
      attach_side: right
      attach_gap: 20
      route: auto
      style:
        color: colors.status.info
        width: 9
        corner_style: round
        corner_radius: 120
    - id: line_o2o
      type: line
      attach_to: emergency_button
      anchor: test_grid
      anchor_gap: 30
      attach_gap: 20
      route: auto
      style:
        color: var(--lcars-orange)
        width: 8
    - id: test_line_1
      type: line
      anchor: debug_anchor_1
      attach_to: debug_anchor_2
      route: auto
      style:
        color: var(--lcars-orange)
        width: 8
        dash_array:
          - 20
          - 20
        line_cap: butt
        marker_end:
          type: diamond
          size: medium
          color: var(--lcars-red)
          rotate: false
      corner_style: round
      corner_radius: 36
      2smoothing_mode: chaikin
      smoothing_iterations: 8
      smoothing_max_points: 80
    - id: test_line_2
      type: line
      anchor: debug_anchor_2
      attach_to: debug_anchor_3
      route: auto
      style:
        color: var(--lcars-blue)
        width: 3
        corner_style: round
        corner_radius: 12
    - id: test_line_3
      type: line
      anchor: debug_anchor_3
      attach_to: debug_anchor_4
      route: auto
      style:
        color: var(--lcars-african-violet)
        width: 2
  rules:
    - id: bedroom_light_on_grid_style
      when:
        any:
          - entity: light.tv
            state: "on"
      apply:
        base_svg:
          filter_preset: subtle
          transition: 2500
        overlays:
          test_button1:
            style:
              border:
                width: 3
                color: var(--picard-blue)
                radius_top_left: 0
                bottom:
                  width: 7
                  color: var(--picard-lightest-blue)
              label_color: var(--lcars-red)
              value_color: var(--lcars-orange)
          bedroom_status_grid:
            cell_target:
              cell_id: bed_light_cell
            style:
              cell_color: var(--lcars-yellow)
              bracket_color: var(--lcars-yellow)
              lcars_button_preset: lozenge
              text_layout: diagonal
          temp_apex_chart:
            style:
              color: var(--picard-orange)
              stroke_colors:
                - var(--picard-orange)
              fill_colors:
                - var(--picard-orange)
              fill_opacity: 1
              grid_color: var(--lcars-red)
              axis_color: var(--picard-lightest-blue)
              legend_color: var(--picard-blue)
          title_overlay:
            style:
              color: var(--lcars-red)
              font_size: 32
              font_weight: bold
              opacity: 0.9
              status_indicator: var(--lcars-red)
              status_indicator_position: right
              status_indicator_padding: 10
    - id: bedroom_light_off_grid_style
      when:
        any:
          - entity: light.tv
            state: "off"
      apply:
        base_svg:
          filter_preset: monochrome
          transition: 2500
        overlays:
          test_button1:
            content: fuckme
            style:
              border:
                width: 6
                color: var(--picard-yellow)
                radius_top_left: 34
                bottom:
                  width: 3
              label_color: var(--picard-lightest-blue)
              value_color: var(--picard-lightest-orange)
          bedroom_status_grid:
            cell_target:
              cell_id: bed_light_cell
            style:
              cell_color: var(--lcars-gray)
              bracket_color: var(--lcars-gray)
              cell_opacity: 0.6
          temp_apex_chart:
            style:
              color: var(--picard-blue)
              stroke_colors:
                - var(--picard-blue)
              fill_colors:
                - var(--picard-blue)
              fill_opacity: 0.2
              grid_color: var(--picard-gray)
              axis_color: var(--lcars-african-violet)
              legend_color: var(--lcars-african-violet)
          title_overlay:
            style:
              visible: false
              color: var(--lcars-blue)
              font_size: 28
              font_weight: bold
              opacity: 1
              status_indicator: var(--lcars-african-violet)
              status_indicator_position: right
              status_indicator_padding: 10
    - id: high_temperature_alert
      priority: 100
      when:
        any:
          - entity: temperature_chain
            below: 10
      apply:
        overlays:
          title_overlay:
            style:
              color: var(--lcars-red)
              status_indicator: var(--lcars-red)
    - id: text_geometry_test
      priority: 50
      when:
        any:
          - entity: light.floor_lamp
            state: "on"
      apply:
        overlays:
          title_overlay:
            style:
              status_indicator_position: left-center
              status_indicator_size: 12
              status_indicator: var(--lcars-orange)
    - id: cpu_hot_test
      priority: 10
      when:
        all:
          - entity: sensor.bathroom_dial_battery
            above: 70
      apply:
        overlays:
          cpu_sparkline:
            style:
              color: var(--lcars-red)
          test_line_1:
            style:
              color: var(--lcars-red)
              width: 6
