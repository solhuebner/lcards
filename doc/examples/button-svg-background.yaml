# Simple Button SVG Background Examples
# Demonstrates Phase 1 (Full SVG Background) and Phase 2 (Segmented Interaction) features

# ==============================================================================
# PHASE 1: Full SVG Background Support
# ==============================================================================

# Example 1: Inline SVG with gradient background
- type: custom:lcards-button
  svg:
    content: |
      <rect width="100" height="100" fill="url(#grad1)" />
      <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:rgb(255,153,0);stop-opacity:1" />
          <stop offset="100%" style="stop-color:rgb(204,102,0);stop-opacity:1" />
        </linearGradient>
      </defs>
    viewBox: "0 0 100 100"
  text:
    name:
      content: "Gradient Button"
      position: center
      color: white

# Example 2: External SVG file
- type: custom:lcards-button
  svg:
    src: "/local/shapes/starfleet-delta.svg"
    preserveAspectRatio: "xMidYMid meet"
  text:
    name:
      content: "Starfleet"
      position: bottom-center

# Example 3: SVG with entity-based token replacement
- type: custom:lcards-button
  entity: light.bedroom
  svg:
    enable_tokens: true
    content: |
      <circle cx="50" cy="50" r="40" 
              fill="{{entity.state == 'on' ? 'var(--lcars-orange)' : 'var(--lcars-blue)'}}" />
    viewBox: "0 0 100 100"
  text:
    state:
      content: "{{entity.state}}"
      position: center
      color: white

# Example 4: Complex bezier path (custom shape)
- type: custom:lcards-button
  svg:
    content: |
      <path d="M 50,10 C 30,30 20,60 20,90 L 30,90 C 30,65 40,40 50,25 C 60,40 70,65 70,90 L 80,90 C 80,60 70,30 50,10 Z"
            fill="var(--lcars-red)" />
    viewBox: "0 0 100 100"
  text:
    name:
      content: "Custom Shape"
      position: center

# Example 5: Data URI (embedded SVG)
- type: custom:lcards-button
  svg:
    src: "data:image/svg+xml,%3Csvg viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23FF9900'/%3E%3C/svg%3E"

# ==============================================================================
# PHASE 2: Segmented SVG (Multi-Action Regions)
# ==============================================================================

# Example 6: D-Pad with interactive segments
# Uses state-based styling convention: style.{property}.{state}
# States: default, active, inactive, unavailable, hover
- type: custom:lcards-button
  entity: remote.living_room
  svg:
    content: |
      <svg viewBox="0 0 100 100">
        <!-- Up arrow -->
        <path id="arrow-up" d="M 40,30 L 50,15 L 60,30 L 55,30 L 55,45 L 45,45 L 45,30 Z" fill="var(--lcars-blue)" />
        
        <!-- Down arrow -->
        <path id="arrow-down" d="M 40,70 L 50,85 L 60,70 L 55,70 L 55,55 L 45,55 L 45,70 Z" fill="var(--lcars-blue)" />
        
        <!-- Left arrow -->
        <path id="arrow-left" d="M 30,40 L 15,50 L 30,60 L 30,55 L 45,55 L 45,45 L 30,45 Z" fill="var(--lcars-blue)" />
        
        <!-- Right arrow -->
        <path id="arrow-right" d="M 70,40 L 85,50 L 70,60 L 70,55 L 55,55 L 55,45 L 70,45 Z" fill="var(--lcars-blue)" />
        
        <!-- Center button -->
        <circle id="center-circle" cx="50" cy="50" r="10" fill="var(--lcars-purple)" />
      </svg>
    viewBox: "0 0 100 100"
    segments:
      - id: up
        selector: "#arrow-up"
        tap_action:
          action: call-service
          service: remote.send_command
          data:
            command: UP
        style:
          fill:
            default: "var(--lcars-blue)"
            hover: "var(--lcars-yellow)"
            active: "var(--lcars-red)"
      
      - id: down
        selector: "#arrow-down"
        tap_action:
          action: call-service
          service: remote.send_command
          data:
            command: DOWN
        style:
          fill:
            default: "var(--lcars-blue)"
            hover: "var(--lcars-yellow)"
            active: "var(--lcars-red)"
      
      - id: left
        selector: "#arrow-left"
        tap_action:
          action: call-service
          service: remote.send_command
          data:
            command: LEFT
        style:
          fill:
            default: "var(--lcars-blue)"
            hover: "var(--lcars-yellow)"
            active: "var(--lcars-red)"
      
      - id: right
        selector: "#arrow-right"
        tap_action:
          action: call-service
          service: remote.send_command
          data:
            command: RIGHT
        style:
          fill:
            default: "var(--lcars-blue)"
            hover: "var(--lcars-yellow)"
            active: "var(--lcars-red)"
      
      - id: center
        selector: "#center-circle"
        tap_action:
          action: call-service
          service: remote.send_command
          data:
            command: SELECT
        style:
          fill:
            default: "var(--lcars-purple)"
            hover: "var(--lcars-yellow)"
            active: "var(--lcars-red)"

# Example 7: Media controls with segments
- type: custom:lcards-button
  entity: media_player.living_room
  svg:
    content: |
      <svg viewBox="0 0 200 60">
        <!-- Skip back -->
        <path id="skip-back" d="M 20,30 L 35,20 L 35,40 Z M 15,20 L 15,40 L 18,40 L 18,20 Z" fill="var(--lcars-blue)" />
        
        <!-- Play/Pause -->
        <g id="play-pause">
          <rect x="85" y="18" width="6" height="24" fill="var(--lcars-orange)" />
          <rect x="95" y="18" width="6" height="24" fill="var(--lcars-orange)" />
        </g>
        
        <!-- Skip forward -->
        <path id="skip-forward" d="M 165,30 L 150,20 L 150,40 Z M 180,20 L 180,40 L 177,40 L 177,20 Z" fill="var(--lcars-blue)" />
      </svg>
    viewBox: "0 0 200 60"
    segments:
      - id: skip-back
        selector: "#skip-back"
        tap_action:
          action: call-service
          service: media_player.media_previous_track
        style:
          fill:
            default: "var(--lcars-blue)"
            hover: "var(--lcars-yellow)"
      
      - id: play-pause
        selector: "#play-pause"
        tap_action:
          action: call-service
          service: media_player.media_play_pause
        style:
          fill:
            default: "var(--lcars-orange)"
            hover: "var(--lcars-yellow)"
      
      - id: skip-forward
        selector: "#skip-forward"
        tap_action:
          action: call-service
          service: media_player.media_next_track
        style:
          fill:
            default: "var(--lcars-blue)"
            hover: "var(--lcars-yellow)"

# Example 8: Using data-segment attributes for cleaner selection
- type: custom:lcards-button
  svg:
    content: |
      <svg viewBox="0 0 100 100">
        <rect data-segment="zone1" x="5" y="5" width="40" height="40" fill="var(--lcars-blue)" />
        <rect data-segment="zone2" x="55" y="5" width="40" height="40" fill="var(--lcars-orange)" />
        <rect data-segment="zone3" x="5" y="55" width="40" height="40" fill="var(--lcars-purple)" />
        <rect data-segment="zone4" x="55" y="55" width="40" height="40" fill="var(--lcars-red)" />
      </svg>
    viewBox: "0 0 100 100"
    segments:
      - id: zone1
        selector: "[data-segment='zone1']"
        tap_action:
          action: navigate
          navigation_path: /lovelace/zone1
        style:
          fill:
            default: "var(--lcars-blue)"
            hover: "var(--lcars-yellow)"
      
      - id: zone2
        selector: "[data-segment='zone2']"
        tap_action:
          action: navigate
          navigation_path: /lovelace/zone2
        style:
          fill:
            default: "var(--lcars-orange)"
            hover: "var(--lcars-yellow)"
      
      - id: zone3
        selector: "[data-segment='zone3']"
        tap_action:
          action: navigate
          navigation_path: /lovelace/zone3
        style:
          fill:
            default: "var(--lcars-purple)"
            hover: "var(--lcars-yellow)"
      
      - id: zone4
        selector: "[data-segment='zone4']"
        tap_action:
          action: navigate
          navigation_path: /lovelace/zone4
        style:
          fill:
            default: "var(--lcars-red)"
            hover: "var(--lcars-yellow)"

# Example 9: Segment with different entities
- type: custom:lcards-button
  svg:
    content: |
      <svg viewBox="0 0 100 100">
        <circle id="light1" cx="25" cy="50" r="20" fill="gray" />
        <circle id="light2" cx="75" cy="50" r="20" fill="gray" />
      </svg>
    viewBox: "0 0 100 100"
    segments:
      - id: light1
        selector: "#light1"
        entity: light.bedroom  # This segment controls bedroom light
        tap_action:
          action: toggle
        style:
          fill:
            default: "gray"
            hover: "var(--lcars-yellow)"
      
      - id: light2
        selector: "#light2"
        entity: light.living_room  # This segment controls living room light
        tap_action:
          action: toggle
        style:
          fill:
            default: "gray"
            hover: "var(--lcars-yellow)"

# Example 10: Hold action for more-info
- type: custom:lcards-button
  entity: light.all_lights
  svg:
    content: |
      <svg viewBox="0 0 100 100">
        <rect id="main-button" x="10" y="10" width="80" height="80" rx="10" fill="var(--lcars-orange)" />
      </svg>
    viewBox: "0 0 100 100"
    segments:
      - id: main
        selector: "#main-button"
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        style:
          fill:
            default: "var(--lcars-orange)"
            hover: "var(--lcars-yellow)"
            active: "var(--lcars-red)"
  text:
    label:
      content: "All Lights"
      position: center
      color: black
