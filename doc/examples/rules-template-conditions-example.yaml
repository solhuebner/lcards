# RulesEngine Template Conditions - Complete Examples
#
# This file demonstrates JavaScript and Jinja2 template conditions in rules
# For complete documentation, see: doc/user-guide/configuration/template-conditions.md
#
# ✅ CORRECT SYNTAX (v1.9.43+):
#
# JavaScript:
#   condition: '[[[return states["entity.id"].state === "value"]]]'
#
# Jinja2:
#   condition: "{{ states('entity.id') == 'value' }}"
#
# Available in JavaScript context:
#   - states: All Home Assistant entity states object
#   - hass: Full Home Assistant object
#   - entity: Current entity (if rule has entity defined)
#
# See doc/user-guide/configuration/template-conditions.md for complete guide!

# ============================================================================
# EXAMPLE 1: Simple State Check - Light On/Off
# ============================================================================

# --------- Standard entity condition ---------
rules:
  - id: light_on_standard
    when:
      any:
        - entity: light.living_room
          state: "on"
    apply:
      overlays:
        status_light:
          style:
            color: var(--lcars-green)

  # --------- JavaScript template ---------
  - id: light_on_javascript
    when:
      any:
        - condition: '[[[return states["light.living_room"].state === "on"]]]'
    apply:
      overlays:
        status_light:
          style:
            color: var(--lcars-green)

  # --------- Jinja2 template ---------
  - id: light_on_jinja2
    when:
      any:
        - condition: "{{ states('light.living_room') == 'on' }}"
    apply:
      overlays:
        status_light:
          style:
            color: var(--lcars-green)

# For more examples, see: doc/user-guide/configuration/template-conditions.md
