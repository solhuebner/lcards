# LCARdS D-Pad Component Examples
#
# The D-Pad component provides a 9-segment interactive control for
# media players, remotes, and directional navigation.
#
# Segments:
# - Directional: up, down, left, right (orange in default theme)
# - Diagonal: up-left, up-right, down-left, down-right (blue in default theme)
# - Center: center button (purple in default theme)
#
# All segments support entity states and interactive states (hover/pressed).
# Theme tokens automatically apply colors based on component type and state.

# ==============================================================================
# EXAMPLE 1: Basic Media Player Control
# ==============================================================================
type: custom:lcards-button
component: dpad
entity: media_player.living_room
dpad:
  segments:
    # Directional controls
    up:
      tap_action:
        action: call-service
        service: media_player.volume_up
    down:
      tap_action:
        action: call-service
        service: media_player.volume_down
    left:
      tap_action:
        action: call-service
        service: media_player.media_previous_track
    right:
      tap_action:
        action: call-service
        service: media_player.media_next_track

    # Center play/pause
    center:
      tap_action:
        action: call-service
        service: media_player.media_play_pause

---

# ==============================================================================
# EXAMPLE 2: Full Remote Control with All Segments
# ==============================================================================
type: custom:lcards-button
component: dpad
entity: remote.roku
dpad:
  segments:
    # Directional navigation
    up:
      tap_action:
        action: call-service
        service: remote.send_command
        data:
          command: up
    down:
      tap_action:
        action: call-service
        service: remote.send_command
        data:
          command: down
    left:
      tap_action:
        action: call-service
        service: remote.send_command
        data:
          command: left
    right:
      tap_action:
        action: call-service
        service: remote.send_command
        data:
          command: right

    # Diagonal shortcuts
    up-left:
      tap_action:
        action: call-service
        service: remote.send_command
        data:
          command: home
    up-right:
      tap_action:
        action: call-service
        service: remote.send_command
        data:
          command: back
    down-left:
      tap_action:
        action: call-service
        service: remote.send_command
        data:
          command: info
    down-right:
      tap_action:
        action: call-service
        service: remote.send_command
        data:
          command: options

    # Center select
    center:
      tap_action:
        action: call-service
        service: remote.send_command
        data:
          command: select

---

# ==============================================================================
# EXAMPLE 3: Multi-Entity Segments with State Tracking
# ==============================================================================
type: custom:lcards-button
component: dpad
dpad:
  segments:
    # Each segment tracks its own entity state
    up:
      entity: light.bedroom
      tap_action:
        action: toggle
    down:
      entity: light.kitchen
      tap_action:
        action: toggle
    left:
      entity: light.living_room
      tap_action:
        action: toggle
    right:
      entity: light.hallway
      tap_action:
        action: toggle
    center:
      entity: light.all_lights
      tap_action:
        action: toggle

---

# ==============================================================================
# EXAMPLE 4: Theme Token Overrides (Advanced)
# ==============================================================================
type: custom:lcards-button
component: dpad
entity: media_player.sonos
dpad:
  segments:
    # Override theme colors for specific segments
    up:
      fill:
        active: "var(--lcars-green, #99CC99)"  # Custom active color
        inactive: "var(--lcars-dark-gray, #666666)"
      tap_action:
        action: call-service
        service: media_player.volume_up

    down:
      fill:
        active: "var(--lcars-red, #CC6666)"  # Custom active color
      tap_action:
        action: call-service
        service: media_player.volume_down

    # Other segments use default theme tokens
    left:
      tap_action:
        action: call-service
        service: media_player.media_previous_track
    right:
      tap_action:
        action: call-service
        service: media_player.media_next_track
    center:
      tap_action:
        action: call-service
        service: media_player.media_play_pause

---

# ==============================================================================
# EXAMPLE 5: Hold and Double-Tap Actions
# ==============================================================================
type: custom:lcards-button
component: dpad
entity: media_player.living_room
dpad:
  segments:
    up:
      tap_action:
        action: call-service
        service: media_player.volume_up
      hold_action:
        action: call-service
        service: media_player.volume_set
        data:
          volume_level: 1.0

    down:
      tap_action:
        action: call-service
        service: media_player.volume_down
      hold_action:
        action: call-service
        service: media_player.volume_mute

    center:
      tap_action:
        action: call-service
        service: media_player.media_play_pause
      double_tap_action:
        action: call-service
        service: media_player.media_stop

---

# ==============================================================================
# EXAMPLE 6: Minimal Configuration (Defaults to theme)
# ==============================================================================
type: custom:lcards-button
component: dpad
entity: media_player.bedroom
dpad:
  segments:
    up: { tap_action: { action: call-service, service: media_player.volume_up } }
    down: { tap_action: { action: call-service, service: media_player.volume_down } }
    left: { tap_action: { action: call-service, service: media_player.media_previous_track } }
    right: { tap_action: { action: call-service, service: media_player.media_next_track } }
    center: { tap_action: { action: call-service, service: media_player.media_play_pause } }

---

# ==============================================================================
# NOTES
# ==============================================================================
#
# Component Preset System:
# - Component presets load predefined SVG shapes with labeled segments
# - Theme tokens automatically apply based on segment type
# - User config merges with component defaults (user takes precedence)
# - All existing segment features work: entity tracking, states, interactions
#
# Theme Token Structure (lcarsClassicTokens.js):
# components:
#   dpad:
#     segment:
#       directional:      # up, down, left, right
#         fill: { active, inactive, hover, pressed, unavailable, unknown }
#         stroke: { active, inactive, hover, pressed, unavailable, unknown }
#         stroke-width: { active, inactive, hover, pressed, unavailable, unknown }
#       diagonal:         # up-left, up-right, down-left, down-right
#         fill: { ... }
#         stroke: { ... }
#         stroke-width: { ... }
#       center:           # center button
#         fill: { ... }
#         stroke: { ... }
#         stroke-width: { ... }
#
# Segment States (auto-detected from entity):
# - active: Entity is "on" or active state
# - inactive: Entity is "off" or inactive state
# - unavailable: Entity is unavailable
# - unknown: Entity state is unknown
# - hover: Mouse hovering over segment (always available)
# - pressed: Segment is being clicked (always available)
#
# Creating Custom Components:
# 1. Create SVG shape in src/core/packs/shapes/ with labeled segments
# 2. Create component preset in src/core/packs/components/
# 3. Add theme tokens in src/core/themes/tokens/
# 4. Register in respective index.js files
